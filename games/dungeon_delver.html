<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dungeon Delver - JNR</title>
    <style>
        body { background: #1a1a1a; color: #fff; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        canvas { background: #121212; border: 4px solid #5d4037; }
        .ui { margin-bottom: 10px; font-size: 1.2rem; color: #fff; }
        .back-link { margin-top: 10px; color: #444; text-decoration: none; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="ui">GOLD: <span id="score">0</span> | BEST: <span id="best">0</span></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <a href="../index.html" class="back-link">ESC TO MENU</a>

    <script src="../js/engine.js"></script>
    <script>
        class Delver extends Entity {
            constructor() {
                super(20, 20, 24, 24, '#fff');
                this.speed = 4;
                this.dashCooldown = 0;
                this.isDashing = false;
            }
            update(game, deltaTime) {
                let oldX = this.x;
                let oldY = this.y;

                let moveX = 0;
                let moveY = 0;

                if (game.keys['ArrowUp'] || game.keys['KeyW']) moveY -= 1;
                if (game.keys['ArrowDown'] || game.keys['KeyS']) moveY += 1;
                if (game.keys['ArrowLeft'] || game.keys['KeyA']) moveX -= 1;
                if (game.keys['ArrowRight'] || game.keys['KeyD']) moveX += 1;

                if (game.keys['Space'] && this.dashCooldown <= 0 && (moveX !== 0 || moveY !== 0)) {
                    this.isDashing = true;
                    this.dashCooldown = 1000;
                    game.playSound(600, 0.1, 'sawtooth');
                    setTimeout(() => { this.isDashing = false; }, 150);
                }

                const currentSpeed = this.isDashing ? this.speed * 4 : this.speed;
                this.x += moveX * currentSpeed;
                this.y += moveY * currentSpeed;

                if (this.dashCooldown > 0) this.dashCooldown -= deltaTime;

                if (this.x < 0 || this.x > game.width - this.width || this.y < 0 || this.y > game.height - this.height) {
                    this.x = oldX;
                    this.y = oldY;
                }

                game.entities.forEach(e => {
                    if (e instanceof Wall && this.collidesWith(e)) {
                        this.x = oldX;
                        this.y = oldY;
                    }
                    if (e instanceof Trap && this.collidesWith(e)) {
                        if (!this.isDashing) {
                            game.state = 'lost';
                            game.playDeathSound();
                            for(let i=0; i<15; i++) game.addParticle(this.x + 12, this.y + 12, '#f44336');
                        }
                    }
                    if (e instanceof Enemy && this.collidesWith(e)) {
                        game.state = 'lost';
                        game.playDeathSound();
                        for(let i=0; i<15; i++) game.addParticle(this.x + 12, this.y + 12, '#f44336');
                    }
                    if (e instanceof Gold && this.collidesWith(e)) {
                        e.markedForDeletion = true;
                        game.score += 50;
                        document.getElementById('score').innerText = game.score;
                        game.playSound(900, 0.05);
                        for(let i=0; i<10; i++) game.addParticle(e.x + 8, e.y + 8, '#ffd700');
                    }
                    if (e instanceof Exit && this.collidesWith(e)) {
                        game.state = 'won';
                        game.playSound(1000, 0.5);
                    }
                });
            }
            draw(ctx) {
                if (this.isDashing) {
                    ctx.globalAlpha = 0.5;
                    ctx.fillStyle = '#00fff5';
                    ctx.fillRect(this.x, this.y, this.width, this.height);
                    ctx.globalAlpha = 1.0;
                }
                ctx.save();
                // Knight Body
                ctx.fillStyle = '#9e9e9e'; // Armor
                ctx.fillRect(this.x + 4, this.y + 4, 16, 16);
                // Helmet
                ctx.fillStyle = '#616161';
                ctx.fillRect(this.x + 4, this.y, 16, 10);
                ctx.fillStyle = '#000'; // Visor
                ctx.fillRect(this.x + 6, this.y + 4, 12, 2);
                // Shield
                ctx.fillStyle = '#d32f2f';
                ctx.fillRect(this.x + 16, this.y + 10, 8, 10);
                // Sword
                ctx.fillStyle = '#cfd8dc';
                ctx.fillRect(this.x, this.y + 8, 4, 12);
                ctx.restore();
            }
        }

        class Enemy extends Entity {
            constructor(x, y, x2, y2) {
                super(x, y, 24, 24, '#f44336');
                this.start = {x, y};
                this.end = {x: x2, y: y2};
                this.target = this.end;
                this.speed = 2;
            }
            update(game, deltaTime) {
                const dx = this.target.x - this.x;
                const dy = this.target.y - this.y;
                const dist = Math.sqrt(dx*dx + dy*dy);

                if (dist < 5) {
                    this.target = this.target === this.end ? this.start : this.end;
                } else {
                    this.x += (dx / dist) * this.speed;
                    this.y += (dy / dist) * this.speed;
                }
            }
            draw(ctx) {
                ctx.fillStyle = '#f44336';
                ctx.beginPath();
                ctx.moveTo(this.x + 12, this.y);
                ctx.lineTo(this.x + 24, this.y + 24);
                ctx.lineTo(this.x, this.y + 24);
                ctx.closePath();
                ctx.fill();
                // Eye
                ctx.fillStyle = '#fff';
                ctx.fillRect(this.x + 8, this.y + 10, 8, 4);
            }
        }

        class Wall extends Entity {
            constructor(x, y, w, h) {
                super(x, y, w, h, '#4e342e');
            }
            update(game, deltaTime) {}
            draw(ctx) {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.width, this.height);
                // Brick pattern
                ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                ctx.lineWidth = 1;
                for(let i=0; i<this.width; i+=20) {
                    for(let j=0; j<this.height; j+=10) {
                        ctx.strokeRect(this.x + i, this.y + j, 20, 10);
                    }
                }
            }
        }

        class Trap extends Entity {
            constructor(x, y) {
                super(x, y, 20, 20, '#f44336');
            }
            update(game, deltaTime) {}
            draw(ctx) {
                ctx.fillStyle = '#333';
                ctx.fillRect(this.x, this.y, 20, 20);
                // Spikes
                ctx.fillStyle = '#9e9e9e';
                for(let i=0; i<3; i++) {
                    ctx.beginPath();
                    ctx.moveTo(this.x + 4 + i*6, this.y + 16);
                    ctx.lineTo(this.x + 7 + i*6, this.y + 4);
                    ctx.lineTo(this.x + 10 + i*6, this.y + 16);
                    ctx.fill();
                }
            }
        }

        class Gold extends Entity {
            constructor(x, y) {
                super(x, y, 16, 16, '#ffd700');
            }
            update(game, deltaTime) {}
            draw(ctx) {
                // Chest
                ctx.fillStyle = '#795548';
                ctx.fillRect(this.x, this.y + 4, 16, 12);
                ctx.fillStyle = '#ffd700'; // Gold lid
                ctx.fillRect(this.x, this.y, 16, 4);
                ctx.fillStyle = '#000'; // Lock
                ctx.fillRect(this.x + 6, this.y + 6, 4, 4);
            }
        }

        class Exit extends Entity {
            constructor(x, y) {
                super(x, y, 32, 32, '#4caf50');
            }
            update(game, deltaTime) {}
            draw(ctx) {
                // Portal effect
                const r = (Date.now() * 0.005) % (Math.PI * 2);
                ctx.save();
                ctx.translate(this.x + 16, this.y + 16);
                ctx.rotate(r);
                const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, 20);
                grad.addColorStop(0, '#4caf50');
                grad.addColorStop(1, 'transparent');
                ctx.fillStyle = grad;
                ctx.beginPath();
                for(let i=0; i<8; i++) {
                    const angle = (i / 8) * Math.PI * 2;
                    ctx.lineTo(Math.cos(angle) * 16, Math.sin(angle) * 16);
                }
                ctx.fill();
                ctx.restore();
            }
        }

        class DungeonGame extends Game {
            constructor() {
                super('gameCanvas', { gravity: 0, friction: 1, gameId: 'dungeon_delver' });
                document.getElementById('best').innerText = this.highScore;
                this.entities.push(new Delver());
                this.setupMap();
            }
            setupMap() {
                // Outer walls
                for(let i=0; i<5; i++) {
                    this.entities.push(new Wall(100, i*40, 20, 40));
                    this.entities.push(new Wall(200, 400 - i*40 - 40, 20, 40));
                    this.entities.push(new Wall(300, i*40 + 100, 20, 40));
                }
                this.entities.push(new Gold(150, 50));
                this.entities.push(new Gold(250, 350));
                this.entities.push(new Gold(50, 300));
                this.entities.push(new Trap(150, 200));
                this.entities.push(new Trap(250, 100));
                this.entities.push(new Trap(50, 150));

                this.entities.push(new Enemy(120, 10, 120, 350));
                this.entities.push(new Enemy(220, 350, 220, 10));

                this.entities.push(new Exit(360, 360));
            }
            update(deltaTime) {
                super.update(deltaTime);
                this.entities = this.entities.filter(e => !e.markedForDeletion);
            }
            draw() {
                // Floor texture
                this.ctx.fillStyle = '#1a1a1a';
                this.ctx.fillRect(0, 0, this.width, this.height);
                this.ctx.strokeStyle = '#222';
                this.ctx.lineWidth = 1;
                for(let i=0; i<this.width; i+=40) {
                    for(let j=0; j<this.height; j+=40) {
                        this.ctx.strokeRect(i, j, 40, 40);
                    }
                }
                super.draw();
            }
        }
        const game = new DungeonGame();
        game.start();
    </script>
</body>
</html>
