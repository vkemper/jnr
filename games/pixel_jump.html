<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Pixel Jump - JNR</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        canvas {
            background-color: #87CEEB;
            border: 4px solid #333;
        }
        .ui {
            margin-bottom: 10px;
            font-size: 1.2rem;
            color: #fff;
            text-shadow: 2px 2px #000;
        }
        .back-link {
            margin-top: 10px;
            color: #444;
            text-decoration: none;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="ui">LEVEL: <span id="level">1</span> | COINS: <span id="coins">0</span> | BEST: <span id="best">0</span></div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <a href="../index.html" class="back-link">ESC TO MENU</a>

    <script src="../js/engine.js"></script>
    <script>
        class Player extends Entity {
            constructor() {
                super(50, 300, 30, 40, '#ffcc00');
                this.jumpForce = -12;
                this.speed = 5;
                this.facing = 1;
                this.animTimer = 0;
            }
            update(game, deltaTime) {
                if (game.keys['ArrowLeft'] || game.keys['KeyA']) {
                    this.vx = -this.speed;
                    this.facing = -1;
                }
                if (game.keys['ArrowRight'] || game.keys['KeyD']) {
                    this.vx = this.speed;
                    this.facing = 1;
                }

                if ((game.keys['ArrowUp'] || game.keys['Space'] || game.keys['KeyW']) && this.onGround) {
                    this.vy = this.jumpForce;
                    this.onGround = false;
                    game.playSound(400, 0.1, 'sine');
                    // Jump particles
                    for(let i=0; i<5; i++) game.addParticle(this.x + this.width/2, this.y + this.height, '#fff');
                }

                super.update(game);
                this.animTimer += deltaTime;

                // Platform collision
                game.entities.forEach(e => {
                    if (e instanceof Platform) {
                        if (this.vy > 0 &&
                            this.y + this.height <= e.y + this.vy &&
                            this.y + this.height + this.vy >= e.y &&
                            this.x + this.width > e.x &&
                            this.x < e.x + e.width) {
                            this.y = e.y - this.height;
                            this.vy = 0;
                            this.onGround = true;
                        }
                    }
                });

                // Level completion
                if (this.x > game.width - 50) {
                    game.nextLevel();
                }

                // Collect coins
                game.entities.forEach(e => {
                    if (e instanceof Coin && this.collidesWith(e)) {
                        e.markedForDeletion = true;
                        game.score++;
                        document.getElementById('coins').innerText = game.score;
                        game.playSound(800, 0.05, 'sine');
                        for(let i=0; i<8; i++) game.addParticle(e.x + 7, e.y + 7, '#ffd700');
                    }
                });
            }
            draw(ctx) {
                ctx.save();
                ctx.translate(this.x + this.width/2, this.y + this.height);

                // Squish/Stretch
                let stretch = 1;
                let squish = 1;
                if (!this.onGround) {
                    stretch = 1.2;
                    squish = 0.8;
                } else if (Math.abs(this.vx) > 0.1) {
                    squish = 1 + Math.sin(this.animTimer * 0.01) * 0.1;
                }
                ctx.scale(squish * this.facing, stretch);

                // Body
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.width/2, -this.height, this.width, this.height);

                // Overalls
                ctx.fillStyle = '#304ffe';
                ctx.fillRect(-this.width/2, -15, this.width, 15);
                ctx.fillRect(-this.width/2, -25, 5, 10);
                ctx.fillRect(this.width/2 - 5, -25, 5, 10);

                // Cap
                ctx.fillStyle = '#d50000';
                ctx.fillRect(-this.width/2 - 4, -this.height, this.width + 8, 8);
                ctx.fillRect(-this.width/2 - 2, -this.height - 2, this.width + 2, 4);

                // Face details
                ctx.fillStyle = '#000';
                ctx.fillRect(6, -this.height + 12, 4, 4); // Eye
                ctx.fillStyle = '#4e342e';
                ctx.fillRect(4, -this.height + 18, 12, 4); // Mustache

                ctx.restore();
            }
        }

        class Platform extends Entity {
            constructor(x, y, w, h) {
                super(x, y, w, h, '#5d4037');
            }
            update() {}
            draw(ctx) {
                // Dirt
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.width, this.height);

                // Grass
                ctx.fillStyle = '#4caf50';
                ctx.fillRect(this.x, this.y, this.width, 12);

                // Grass blades
                ctx.beginPath();
                ctx.strokeStyle = '#2e7d32';
                ctx.lineWidth = 2;
                for(let i=0; i<this.width; i+=10) {
                    ctx.moveTo(this.x + i, this.y);
                    ctx.lineTo(this.x + i + 2, this.y - 4);
                }
                ctx.stroke();

                // Texture/Rocks in dirt
                ctx.fillStyle = 'rgba(0,0,0,0.1)';
                for(let i=0; i<3; i++) {
                    ctx.fillRect(this.x + 10 + i*30, this.y + 20, 8, 4);
                }
            }
        }

        class Coin extends Entity {
            constructor(x, y) {
                super(x, y, 15, 15, '#ffd700');
                this.animTimer = Math.random() * 100;
            }
            update(game, deltaTime) {
                this.animTimer += deltaTime * 0.01;
            }
            draw(ctx) {
                const scale = Math.abs(Math.sin(this.animTimer));
                ctx.save();
                ctx.translate(this.x + 7.5, this.y + 7.5);
                ctx.scale(scale, 1);

                ctx.fillStyle = '#ffeb3b';
                ctx.beginPath();
                ctx.arc(0, 0, 7.5, 0, Math.PI * 2);
                ctx.fill();

                ctx.strokeStyle = '#fbc02d';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Shine
                if (scale > 0.8) {
                    ctx.fillStyle = '#fff';
                    ctx.globalAlpha = 0.5;
                    ctx.fillRect(-2, -5, 2, 10);
                    ctx.globalAlpha = 1;
                }

                ctx.restore();
            }
        }

        class PixelGame extends Game {
            constructor() {
                super('gameCanvas', { gameId: 'pixel_jump' });
                this.level = 1;
                document.getElementById('best').innerText = this.highScore;
                this.score = 0;
                this.setupLevel();
                this.clouds = Array.from({length: 8}, () => ({
                    x: Math.random() * 800,
                    y: 20 + Math.random() * 120,
                    s: 0.1 + Math.random() * 0.3,
                    w: 40 + Math.random() * 60
                }));
                this.mountains = Array.from({length: 3}, (_, i) => ({
                    x: i * 400,
                    h: 150 + Math.random() * 100
                }));
            }
            setupLevel() {
                this.entities = [new Player()];
                if (this.level === 1) {
                    this.entities.push(new Platform(0, 350, 200, 50));
                    this.entities.push(new Platform(250, 280, 150, 20));
                    this.entities.push(new Platform(450, 200, 150, 20));
                    this.entities.push(new Platform(650, 300, 150, 100));
                    this.entities.push(new Coin(300, 240));
                    this.entities.push(new Coin(500, 160));
                } else if (this.level === 2) {
                    this.entities.push(new Platform(0, 350, 100, 50));
                    this.entities.push(new Platform(150, 250, 100, 20));
                    this.entities.push(new Platform(300, 180, 100, 20));
                    this.entities.push(new Platform(480, 250, 100, 20));
                    this.entities.push(new Platform(650, 320, 150, 80));
                    this.entities.push(new Coin(190, 210));
                    this.entities.push(new Coin(340, 140));
                    this.entities.push(new Coin(520, 210));
                } else if (this.level === 3) {
                    this.entities.push(new Platform(0, 350, 80, 50));
                    this.entities.push(new Platform(150, 280, 60, 20));
                    this.entities.push(new Platform(300, 210, 60, 20));
                    this.entities.push(new Platform(450, 140, 60, 20));
                    this.entities.push(new Platform(600, 210, 60, 20));
                    this.entities.push(new Platform(700, 300, 100, 100));
                    this.entities.push(new Coin(170, 240));
                    this.entities.push(new Coin(320, 170));
                    this.entities.push(new Coin(470, 100));
                    this.entities.push(new Coin(620, 170));
                } else {
                    this.entities.push(new Platform(0, 350, 50, 50));
                    this.entities.push(new Platform(120, 300, 50, 20));
                    this.entities.push(new Platform(240, 250, 50, 20));
                    this.entities.push(new Platform(360, 200, 50, 20));
                    this.entities.push(new Platform(480, 150, 50, 20));
                    this.entities.push(new Platform(600, 200, 50, 20));
                    this.entities.push(new Platform(720, 300, 80, 100));
                    this.entities.push(new Coin(135, 260));
                    this.entities.push(new Coin(375, 160));
                    this.entities.push(new Coin(615, 160));
                    this.entities.push(new Coin(750, 260));
                }
            }
            nextLevel() {
                this.level++;
                if (this.level > 4) {
                    this.state = 'won';
                    this.playSound(600, 0.5, 'sine');
                } else {
                    document.getElementById('level').innerText = this.level;
                    this.setupLevel();
                }
            }
            update(deltaTime) {
                super.update(deltaTime);
                this.entities = this.entities.filter(e => !e.markedForDeletion);
                this.clouds.forEach(c => {
                    c.x -= c.s;
                    if (c.x < -100) c.x = 850;
                });
            }
            draw() {
                // Sky gradient
                const skyGrad = this.ctx.createLinearGradient(0, 0, 0, this.height);
                skyGrad.addColorStop(0, '#4fc3f7');
                skyGrad.addColorStop(1, '#e1f5fe');
                this.ctx.fillStyle = skyGrad;
                this.ctx.fillRect(0, 0, this.width, this.height);

                // Distant Mountains (Parallax Layer 1)
                this.ctx.fillStyle = '#90a4ae';
                this.mountains.forEach(m => {
                    const px = (m.x - this.entities[0].x * 0.1) % 1200;
                    this.ctx.beginPath();
                    this.ctx.moveTo(px, this.height);
                    this.ctx.lineTo(px + 200, this.height - m.h);
                    this.ctx.lineTo(px + 400, this.height);
                    this.ctx.fill();
                });

                // Clouds (Parallax Layer 2)
                this.ctx.fillStyle = '#fff';
                this.ctx.globalAlpha = 0.8;
                this.clouds.forEach(c => {
                    const cx = (c.x - this.entities[0].x * 0.3) % (this.width + 200) - 100;
                    this.ctx.beginPath();
                    this.ctx.arc(cx, c.y, c.w/3, 0, Math.PI*2);
                    this.ctx.arc(cx + c.w/4, c.y - c.w/5, c.w/3, 0, Math.PI*2);
                    this.ctx.arc(cx + c.w/2, c.y, c.w/3, 0, Math.PI*2);
                    this.ctx.fill();
                });
                this.ctx.globalAlpha = 1.0;

                super.draw();
            }
        }

        const game = new PixelGame();
        document.body.addEventListener('keydown', () => {
            game.startMusic([
                {f: 261.63, d: 0.2}, {f: 329.63, d: 0.2}, {f: 392.00, d: 0.2}, {f: 523.25, d: 0.4}
            ]);
        }, { once: true });
        game.start();
    </script>
</body>
</html>
