<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Pixel Jump - JNR</title>
    <style>
        body {
            background-color: #222;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(to bottom, #111, #333);
        }
        canvas {
            background-color: #5abff0;
            border: 8px solid #000;
            image-rendering: pixelated;
        }
        .ui {
            margin-top: 15px;
            font-size: 1.5rem;
            color: #ffa300;
        }
        .back-link {
            margin-top: 10px;
            color: #aaa;
            text-decoration: none;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="ui">LEVEL <span id="levelNum">1</span> | COINS <span id="coinCount">0</span>/5</div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <a href="../index.html" class="back-link">ESC TO MENU</a>

    <script src="../js/engine.js"></script>
    <script>
        class PixelPlayer extends Player {
            constructor(x, y) {
                super(x, y, '#ff004d');
                this.coins = 0;
                this.frame = 0;
            }

            update(game) {
                super.update(game);
                this.frame += 0.1;

                game.entities.forEach(entity => {
                    if (entity instanceof Platform) {
                        if (this.vy > 0 &&
                            this.y + this.height <= entity.y + this.vy &&
                            this.y + this.height + this.vy >= entity.y &&
                            this.x + this.width > entity.x &&
                            this.x < entity.x + entity.width) {
                            this.y = entity.y - this.height;
                            this.vy = 0;
                            this.onGround = true;
                        }
                    }
                    if (entity instanceof Coin && this.collidesWith(entity)) {
                        this.coins++;
                        game.playCoinSound();
                        document.getElementById('coinCount').innerText = this.coins;
                        entity.collected = true;
                        if (this.coins >= 5) {
                            game.winLevel();
                        }
                    }
                });
            }

            draw(ctx) {
                const walk = Math.sin(this.frame) * 5;
                ctx.fillStyle = this.color;
                // Body
                ctx.fillRect(this.x, this.y, this.width, this.height);
                // Eyes
                ctx.fillStyle = '#fff';
                ctx.fillRect(this.x + 20, this.y + 5, 8, 8);
                ctx.fillStyle = '#000';
                ctx.fillRect(this.x + 24, this.y + 7, 4, 4);
                // Cap
                ctx.fillStyle = '#000';
                ctx.fillRect(this.x - 2, this.y, 36, 5);
                // Feet
                ctx.fillStyle = '#333';
                if (!this.onGround) {
                    ctx.fillRect(this.x + 5, this.y + 32, 10, 5);
                    ctx.fillRect(this.x + 18, this.y + 32, 10, 5);
                } else {
                    ctx.fillRect(this.x + 5 + walk, this.y + 32, 10, 5);
                    ctx.fillRect(this.x + 18 - walk, this.y + 32, 10, 5);
                }
            }
        }

        class Coin extends Entity {
            constructor(x, y) {
                super(x, y, 20, 20, '#ffec27');
                this.collected = false;
                this.bob = 0;
            }
            update(game, deltaTime) {
                this.bob += deltaTime * 0.005;
                this.yOffset = Math.sin(this.bob) * 5;
            }
            draw(ctx) {
                if (this.collected) return;
                ctx.fillStyle = '#ffa300';
                ctx.beginPath();
                ctx.arc(this.x + 10, this.y + 10 + (this.yOffset || 0), 10, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x + 10, this.y + 10 + (this.yOffset || 0), 7, 0, Math.PI*2);
                ctx.fill();
            }
        }

        class PixelGame extends Game {
            constructor() {
                super('gameCanvas');
                this.loadLevel(1);
            }

            loadLevel(num) {
                this.level = num;
                this.entities = [];
                this.state = 'playing';
                document.getElementById('levelNum').innerText = num;
                document.getElementById('coinCount').innerText = '0';

                const player = new PixelPlayer(50, 300);
                this.entities.push(player);

                if (num === 1) {
                    this.canvas.style.backgroundColor = '#5abff0';
                    this.entities.push(new Platform(0, 380, 800, 20, '#29adff')); // Floor
                    this.entities.push(new Platform(150, 300, 150, 20, '#00e436'));
                    this.entities.push(new Platform(350, 220, 150, 20, '#00e436'));
                    this.entities.push(new Platform(550, 140, 150, 20, '#00e436'));

                    this.entities.push(new Coin(200, 260));
                    this.entities.push(new Coin(400, 180));
                    this.entities.push(new Coin(600, 100));
                    this.entities.push(new Coin(100, 340));
                    this.entities.push(new Coin(700, 340));
                } else {
                    this.canvas.style.backgroundColor = '#7e2553';
                    // Level 2 fix: lower platforms
                    this.entities.push(new Platform(0, 380, 200, 20, '#ff004d'));
                    this.entities.push(new Platform(250, 320, 120, 20, '#ff004d'));
                    this.entities.push(new Platform(450, 240, 120, 20, '#ff004d'));
                    this.entities.push(new Platform(650, 180, 120, 20, '#ff004d'));
                    this.entities.push(new Platform(300, 130, 150, 20, '#ff004d'));

                    this.entities.push(new Coin(280, 280));
                    this.entities.push(new Coin(480, 200));
                    this.entities.push(new Coin(680, 140));
                    this.entities.push(new Coin(350, 90));
                    this.entities.push(new Coin(50, 340));
                }
            }

            winLevel() {
                this.playWinSound();
                if (this.level === 1) {
                    this.state = 'won';
                    setTimeout(() => {
                        this.loadLevel(2);
                    }, 2000);
                } else {
                    this.state = 'won';
                }
            }

            update(deltaTime) {
                super.update(deltaTime);
                this.entities = this.entities.filter(e => !(e instanceof Coin && e.collected));
            }

            draw() {
                // Background clouds
                this.ctx.fillStyle = 'rgba(255,255,255,0.3)';
                this.ctx.beginPath();
                this.ctx.arc(100, 100, 30, 0, Math.PI*2);
                this.ctx.arc(130, 100, 40, 0, Math.PI*2);
                this.ctx.arc(170, 100, 30, 0, Math.PI*2);
                this.ctx.fill();

                this.ctx.beginPath();
                this.ctx.arc(500, 50, 20, 0, Math.PI*2);
                this.ctx.arc(530, 50, 30, 0, Math.PI*2);
                this.ctx.arc(560, 50, 20, 0, Math.PI*2);
                this.ctx.fill();

                super.draw();
            }
        }

        const game = new PixelGame();
        document.body.addEventListener('keydown', () => {
            game.startMusic([
                {f: 261.63, d: 0.4}, {f: 329.63, d: 0.4}, {f: 392.00, d: 0.4}, {f: 523.25, d: 0.8},
                {f: 392.00, d: 0.4}, {f: 329.63, d: 0.4}, {f: 261.63, d: 0.8}
            ]);
        }, { once: true });
        game.start();
    </script>
</body>
</html>
