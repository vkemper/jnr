<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Pixel Jump - JNR</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        canvas {
            background-color: #87CEEB;
            border: 4px solid #333;
        }
        .ui {
            margin-bottom: 10px;
            font-size: 1.2rem;
            color: #fff;
            text-shadow: 2px 2px #000;
        }
        .back-link {
            margin-top: 10px;
            color: #444;
            text-decoration: none;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="ui">LEVEL: <span id="level">1</span> | COINS: <span id="coins">0</span></div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <a href="../index.html" class="back-link">ESC TO MENU</a>

    <script src="../js/engine.js"></script>
    <script>
        class Player extends Entity {
            constructor() {
                super(50, 300, 30, 40, '#ffcc00');
                this.jumpForce = -12;
                this.speed = 5;
            }
            update(game) {
                if (game.keys['ArrowLeft'] || game.keys['KeyA']) this.vx = -this.speed;
                if (game.keys['ArrowRight'] || game.keys['KeyD']) this.vx = this.speed;

                if ((game.keys['ArrowUp'] || game.keys['Space'] || game.keys['KeyW']) && this.onGround) {
                    this.vy = this.jumpForce;
                    this.onGround = false;
                    game.playSound(400, 0.1, 'sine');
                }

                super.update(game);

                // Platform collision
                game.entities.forEach(e => {
                    if (e instanceof Platform) {
                        if (this.vy > 0 &&
                            this.y + this.height <= e.y + this.vy &&
                            this.y + this.height + this.vy >= e.y &&
                            this.x + this.width > e.x &&
                            this.x < e.x + e.width) {
                            this.y = e.y - this.height;
                            this.vy = 0;
                            this.onGround = true;
                        }
                    }
                });

                // Level completion
                if (this.x > game.width - 50) {
                    game.nextLevel();
                }

                // Collect coins
                game.entities.forEach(e => {
                    if (e instanceof Coin && this.collidesWith(e)) {
                        e.markedForDeletion = true;
                        game.score++;
                        document.getElementById('coins').innerText = game.score;
                        game.playSound(800, 0.05, 'sine');
                    }
                });
            }
            draw(ctx) {
                ctx.fillStyle = this.color;
                // Body
                ctx.fillRect(this.x, this.y, this.width, this.height);
                // Cap
                ctx.fillStyle = '#f00';
                ctx.fillRect(this.x - 2, this.y, this.width + 10, 8);
                // Eye
                ctx.fillStyle = '#000';
                ctx.fillRect(this.x + 20, this.y + 12, 4, 4);
                // Overall
                ctx.fillStyle = '#00f';
                ctx.fillRect(this.x, this.y + 25, this.width, 15);
            }
        }

        class Platform extends Entity {
            constructor(x, y, w, h) {
                super(x, y, w, h, '#8B4513');
            }
            update() {} // Platforms don't move or fall
            draw(ctx) {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.fillStyle = '#228B22';
                ctx.fillRect(this.x, this.y, this.width, 10);
            }
        }

        class Coin extends Entity {
            constructor(x, y) {
                super(x, y, 15, 15, '#ffd700');
            }
            update() {} // Coins stay in place
            draw(ctx) {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x + 7, this.y + 7, 7, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#daa520';
                ctx.stroke();
            }
        }

        class PixelGame extends Game {
            constructor() {
                super('gameCanvas');
                this.level = 1;
                this.score = 0;
                this.setupLevel();
                this.clouds = Array.from({length: 5}, () => ({
                    x: Math.random() * 800,
                    y: 50 + Math.random() * 100,
                    s: 0.2 + Math.random() * 0.5
                }));
            }
            setupLevel() {
                this.entities = [new Player()];
                if (this.level === 1) {
                    this.entities.push(new Platform(0, 350, 200, 50));
                    this.entities.push(new Platform(250, 280, 150, 20));
                    this.entities.push(new Platform(450, 200, 150, 20));
                    this.entities.push(new Platform(650, 300, 150, 100));
                    this.entities.push(new Coin(300, 240));
                    this.entities.push(new Coin(500, 160));
                } else {
                    this.entities.push(new Platform(0, 350, 100, 50));
                    this.entities.push(new Platform(150, 250, 100, 20));
                    this.entities.push(new Platform(300, 180, 100, 20));
                    this.entities.push(new Platform(480, 250, 100, 20));
                    this.entities.push(new Platform(650, 320, 150, 80));
                    this.entities.push(new Coin(190, 210));
                    this.entities.push(new Coin(340, 140));
                    this.entities.push(new Coin(520, 210));
                }
            }
            nextLevel() {
                this.level++;
                if (this.level > 2) {
                    this.state = 'won';
                    this.playSound(600, 0.5, 'sine');
                } else {
                    document.getElementById('level').innerText = this.level;
                    this.setupLevel();
                }
            }
            update(deltaTime) {
                super.update(deltaTime);
                this.entities = this.entities.filter(e => !e.markedForDeletion);
                this.clouds.forEach(c => {
                    c.x -= c.s;
                    if (c.x < -100) c.x = 850;
                });
            }
            draw() {
                // Clouds
                this.ctx.fillStyle = '#fff';
                this.clouds.forEach(c => {
                    this.ctx.beginPath();
                    this.ctx.arc(c.x, c.y, 20, 0, Math.PI*2);
                    this.ctx.arc(c.x + 15, c.y - 10, 20, 0, Math.PI*2);
                    this.ctx.arc(c.x + 30, c.y, 20, 0, Math.PI*2);
                    this.ctx.fill();
                });
                super.draw();
            }
        }

        const game = new PixelGame();
        document.body.addEventListener('keydown', () => {
            game.startMusic([
                {f: 261.63, d: 0.2}, {f: 329.63, d: 0.2}, {f: 392.00, d: 0.2}, {f: 523.25, d: 0.4}
            ]);
        }, { once: true });
        game.start();
    </script>
</body>
</html>
