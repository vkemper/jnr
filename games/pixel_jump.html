<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Pixel Jump - JNR</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        canvas {
            background-color: #87CEEB;
            border: 4px solid #333;
        }
        .ui {
            margin-bottom: 10px;
            font-size: 1.2rem;
            color: #fff;
            text-shadow: 2px 2px #000;
        }
        .back-link {
            margin-top: 10px;
            color: #444;
            text-decoration: none;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="ui">LEVEL: <span id="level">1</span> | COINS: <span id="coins">0</span> | BEST: <span id="best">0</span></div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <a href="../index.html" class="back-link">ESC TO MENU</a>

    <script src="../js/engine.js"></script>
    <script>
        class Player extends Entity {
            constructor(x, y, color, controls, id) {
                super(x, y, 30, 40, color);
                this.jumpForce = -12;
                this.speed = 5;
                this.facing = 1;
                this.animTimer = 0;
                this.controls = controls;
                this.id = id;
                this.score = 0;
            }
            update(game, deltaTime) {
                if (game.keys[this.controls.left]) {
                    this.vx = -this.speed;
                    this.facing = -1;
                }
                if (game.keys[this.controls.right]) {
                    this.vx = this.speed;
                    this.facing = 1;
                }

                if (game.keys[this.controls.up] && this.onGround) {
                    this.vy = this.jumpForce;
                    this.onGround = false;
                    game.playSound(400, 0.1, 'sine');
                    // Jump particles
                    for(let i=0; i<5; i++) game.addParticle(this.x + this.width/2, this.y + this.height, '#fff');
                }

                super.update(game);
                this.animTimer += deltaTime;

                // Platform collision
                game.entities.forEach(e => {
                    if (e instanceof Spike && this.collidesWith(e)) {
                        game.state = 'lost';
                        game.playDeathSound();
                    }
                    if (e instanceof Platform) {
                        if (this.vy > 0 &&
                            this.y + this.height <= e.y + this.vy &&
                            this.y + this.height + this.vy >= e.y &&
                            this.x + this.width > e.x &&
                            this.x < e.x + e.width) {
                            this.y = e.y - this.height;
                            this.vy = 0;
                            this.onGround = true;
                        }
                    }
                });

                // Level completion
                if (this.x > game.width - 50) {
                    game.nextLevel();
                }

                if (this.y > game.height) {
                    game.state = 'lost';
                    game.playDeathSound();
                }

                // Collect coins
                game.entities.forEach(e => {
                    if (e instanceof Coin && this.collidesWith(e)) {
                        e.markedForDeletion = true;
                        this.score++;
                        game.playSound(800, 0.05, 'sine');
                        for(let i=0; i<8; i++) game.addParticle(e.x + 7, e.y + 7, '#ffd700');
                    }
                });
            }
            draw(ctx) {
                ctx.save();
                ctx.translate(this.x + this.width/2, this.y + this.height);

                // Squish/Stretch
                let stretch = 1;
                let squish = 1;
                if (!this.onGround) {
                    stretch = 1.2;
                    squish = 0.8;
                } else if (Math.abs(this.vx) > 0.1) {
                    squish = 1 + Math.sin(this.animTimer * 0.01) * 0.1;
                }
                ctx.scale(squish * this.facing, stretch);

                // Body
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.width/2, -this.height, this.width, this.height);

                // Overalls
                ctx.fillStyle = '#304ffe';
                ctx.fillRect(-this.width/2, -15, this.width, 15);
                ctx.fillRect(-this.width/2, -25, 5, 10);
                ctx.fillRect(this.width/2 - 5, -25, 5, 10);

                // Cap
                ctx.fillStyle = '#d50000';
                ctx.fillRect(-this.width/2 - 4, -this.height, this.width + 8, 8);
                ctx.fillRect(-this.width/2 - 2, -this.height - 2, this.width + 2, 4);

                // Face details
                ctx.fillStyle = '#000';
                ctx.fillRect(6, -this.height + 12, 4, 4); // Eye
                ctx.fillStyle = '#4e342e';
                ctx.fillRect(4, -this.height + 18, 12, 4); // Mustache

                ctx.restore();
            }
        }

        class Spike extends Entity {
            constructor(x, y) {
                super(x, y, 30, 20, '#ff0000');
            }
            update(game, deltaTime) {}
            draw(ctx) {
                ctx.fillStyle = '#666';
                for(let i=0; i<3; i++) {
                    ctx.beginPath();
                    ctx.moveTo(this.x + i*10, this.y + 20);
                    ctx.lineTo(this.x + 5 + i*10, this.y);
                    ctx.lineTo(this.x + 10 + i*10, this.y + 20);
                    ctx.fill();
                }
            }
        }

        class Platform extends Entity {
            constructor(x, y, w, h) {
                super(x, y, w, h, '#5d4037');
            }
            update(game, deltaTime) {}
            draw(ctx) {
                // Dirt
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.width, this.height);

                // Grass
                ctx.fillStyle = '#4caf50';
                ctx.fillRect(this.x, this.y, this.width, 12);

                // Grass blades
                ctx.beginPath();
                ctx.strokeStyle = '#2e7d32';
                ctx.lineWidth = 2;
                for(let i=0; i<this.width; i+=10) {
                    ctx.moveTo(this.x + i, this.y);
                    ctx.lineTo(this.x + i + 2, this.y - 4);
                }
                ctx.stroke();

                // Texture/Rocks in dirt
                ctx.fillStyle = 'rgba(0,0,0,0.1)';
                for(let i=0; i<3; i++) {
                    ctx.fillRect(this.x + 10 + i*30, this.y + 20, 8, 4);
                }
            }
        }

        class Coin extends Entity {
            constructor(x, y) {
                super(x, y, 15, 15, '#ffd700');
                this.animTimer = Math.random() * 100;
            }
            update(game, deltaTime) {
                this.animTimer += deltaTime * 0.01;
            }
            draw(ctx) {
                const scale = Math.abs(Math.sin(this.animTimer));
                ctx.save();
                ctx.translate(this.x + 7.5, this.y + 7.5);
                ctx.scale(scale, 1);

                ctx.fillStyle = '#ffeb3b';
                ctx.beginPath();
                ctx.arc(0, 0, 7.5, 0, Math.PI * 2);
                ctx.fill();

                ctx.strokeStyle = '#fbc02d';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Shine
                if (scale > 0.8) {
                    ctx.fillStyle = '#fff';
                    ctx.globalAlpha = 0.5;
                    ctx.fillRect(-2, -5, 2, 10);
                    ctx.globalAlpha = 1;
                }

                ctx.restore();
            }
        }

        class PixelGame extends Game {
            constructor() {
                super('gameCanvas', { gameId: 'pixel_jump' });
                this.level = 1;
                this.showTrajectory = false;
                this.trajectoryHandler = (e) => {
                    if (e.code === 'KeyT') this.showTrajectory = !this.showTrajectory;
                };
                window.addEventListener('keydown', this.trajectoryHandler);
                document.getElementById('best').innerText = this.highScore;
                this.score = 0;
                this.setupLevel();
                this.clouds = Array.from({length: 8}, () => ({
                    x: Math.random() * 800,
                    y: 20 + Math.random() * 120,
                    s: 0.1 + Math.random() * 0.3,
                    w: 40 + Math.random() * 60
                }));
                this.mountains = Array.from({length: 3}, (_, i) => ({
                    x: i * 400,
                    h: 150 + Math.random() * 100
                }));
            }
            setupLevel() {
                this.trajectories = [
                    [{x: 50, y: 300}, {x: 300, y: 240}, {x: 500, y: 160}, {x: 750, y: 300}], // L1
                    [{x: 50, y: 300}, {x: 190, y: 210}, {x: 340, y: 140}, {x: 520, y: 210}, {x: 750, y: 320}], // L2
                    [{x: 50, y: 300}, {x: 170, y: 240}, {x: 320, y: 170}, {x: 470, y: 100}, {x: 620, y: 170}, {x: 750, y: 300}], // L3
                    [{x: 50, y: 300}, {x: 135, y: 260}, {x: 375, y: 160}, {x: 615, y: 160}, {x: 750, y: 260}, {x: 750, y: 300}], // L4
                    [{x: 50, y: 300}, {x: 110, y: 260}, {x: 310, y: 260}, {x: 510, y: 260}, {x: 750, y: 300}], // L5
                    [{x: 50, y: 300}, {x: 200, y: 310}, {x: 550, y: 210}, {x: 750, y: 300}], // L6
                    [{x: 50, y: 300}, {x: 200, y: 160}, {x: 500, y: 160}, {x: 750, y: 300}], // L7
                    [{x: 50, y: 300}, {x: 170, y: 260}, {x: 320, y: 210}, {x: 470, y: 160}, {x: 620, y: 110}, {x: 750, y: 350}], // L8
                    [{x: 25, y: 200}, {x: 200, y: 310}, {x: 400, y: 310}, {x: 600, y: 310}, {x: 775, y: 200}], // L9
                    [{x: 25, y: 350}, {x: 100, y: 230}, {x: 260, y: 70}, {x: 420, y: 230}, {x: 660, y: 150}, {x: 760, y: 300}], // L10
                    [{x: 50, y: 350}, {x: 200, y: 260}, {x: 300, y: 210}, {x: 400, y: 160}, {x: 500, y: 210}, {x: 600, y: 260}, {x: 750, y: 350}], // L11
                    [{x: 25, y: 350}, {x: 150, y: 60}, {x: 350, y: 60}, {x: 550, y: 60}, {x: 775, y: 350}], // L12
                    [{x: 25, y: 350}, {x: 115, y: 260}, {x: 315, y: 160}, {x: 515, y: 60}, {x: 715, y: 260}, {x: 750, y: 300}], // L13
                    [{x: 50, y: 350}, {x: 100, y: 310}, {x: 400, y: 310}, {x: 700, y: 310}, {x: 750, y: 350}] // L14
                ];
                if (!this.players) {
                    const p1 = new Player(50, 300, '#ffcc00', {left: 'ArrowLeft', right: 'ArrowRight', up: 'ArrowUp'}, 1);
                    const p2 = new Player(50, 300, '#00e436', {left: 'KeyA', right: 'KeyD', up: 'KeyW'}, 2);
                    this.players = [p1, p2];
                } else {
                    this.players.forEach(p => {
                        p.x = 50;
                        p.y = 300;
                        p.vx = 0;
                        p.vy = 0;
                        p.markedForDeletion = false;
                    });
                }
                this.entities = [...this.players];
                const levels = [
                    // Level 1
                    {
                        platforms: [[0, 350, 200, 50], [250, 280, 150, 20], [450, 200, 150, 20], [650, 300, 150, 100]],
                        coins: [[300, 240], [500, 160]],
                        spikes: []
                    },
                    // Level 2
                    {
                        platforms: [[0, 350, 100, 50], [150, 250, 100, 20], [300, 180, 100, 20], [480, 250, 100, 20], [650, 320, 150, 80]],
                        coins: [[190, 210], [340, 140], [520, 210]],
                        spikes: [[320, 380]]
                    },
                    // Level 3
                    {
                        platforms: [[0, 350, 80, 50], [150, 280, 60, 20], [300, 210, 60, 20], [450, 140, 60, 20], [600, 210, 60, 20], [700, 300, 100, 100]],
                        coins: [[170, 240], [320, 170], [470, 100], [620, 170]],
                        spikes: [[250, 380], [500, 380]]
                    },
                    // Level 4
                    {
                        platforms: [[0, 350, 50, 50], [120, 300, 50, 20], [240, 250, 50, 20], [360, 200, 50, 20], [480, 150, 50, 20], [600, 200, 50, 20], [720, 300, 80, 100]],
                        coins: [[135, 260], [375, 160], [615, 160], [750, 260]],
                        spikes: [[200, 380], [400, 380], [600, 380]]
                    },
                    // Level 5
                    {
                        platforms: [[0, 350, 60, 50], [100, 300, 40, 20], [200, 250, 40, 20], [300, 300, 40, 20], [400, 350, 40, 20], [500, 300, 40, 20], [600, 250, 40, 20], [700, 300, 100, 100]],
                        coins: [[110, 260], [310, 260], [510, 260]],
                        spikes: [[150, 380], [350, 380], [550, 380]]
                    },
                    // Level 6
                    {
                        platforms: [[0, 350, 100, 50], [150, 350, 100, 50], [300, 350, 100, 50], [500, 250, 100, 20], [700, 300, 100, 100]],
                        coins: [[200, 310], [550, 210]],
                        spikes: [[100, 330], [250, 330], [400, 380]]
                    },
                    // Level 7
                    {
                        platforms: [[0, 350, 60, 50], [100, 200, 200, 20], [400, 200, 200, 20], [700, 300, 100, 100]],
                        coins: [[200, 160], [500, 160]],
                        spikes: [[100, 180], [500, 180]]
                    },
                    // Level 8
                    {
                        platforms: [[0, 350, 60, 50], [150, 300, 60, 20], [300, 250, 60, 20], [450, 200, 60, 20], [600, 150, 60, 20], [700, 350, 100, 50]],
                        coins: [[170, 260], [320, 210], [470, 160], [620, 110]],
                        spikes: [[200, 380], [400, 380]]
                    },
                    // Level 9
                    {
                        platforms: [[0, 200, 50, 20], [100, 350, 600, 20], [750, 200, 50, 20]],
                        coins: [[200, 310], [400, 310], [600, 310]],
                        spikes: [[150, 330], [350, 330], [550, 330]]
                    },
                    // Level 10
                    {
                        platforms: [[0, 350, 50, 50], [80, 270, 40, 20], [160, 190, 40, 20], [240, 110, 40, 20], [320, 190, 40, 20], [400, 270, 40, 20], [480, 350, 40, 20], [560, 270, 40, 20], [640, 190, 40, 20], [720, 300, 80, 100]],
                        coins: [[100, 230], [260, 70], [420, 230], [660, 150]],
                        spikes: [[120, 380], [360, 380], [600, 380]]
                    },
                    // Level 11
                    {
                        platforms: [[0, 350, 100, 50], [200, 300, 20, 20], [300, 250, 20, 20], [400, 200, 20, 20], [500, 250, 20, 20], [600, 300, 20, 20], [700, 350, 100, 50]],
                        coins: [[200, 260], [300, 210], [400, 160], [500, 210], [600, 260]],
                        spikes: [[150, 380], [250, 380], [350, 380], [450, 380], [550, 380], [650, 380]]
                    },
                    // Level 12
                    {
                        platforms: [[0, 350, 50, 50], [100, 100, 600, 20], [750, 350, 50, 50]],
                        coins: [[150, 60], [350, 60], [550, 60]],
                        spikes: [[200, 380], [400, 380], [600, 380]]
                    },
                    // Level 13
                    {
                        platforms: [[0, 350, 50, 50], [100, 300, 50, 20], [200, 250, 50, 20], [300, 200, 50, 20], [400, 150, 50, 20], [500, 100, 50, 20], [600, 150, 50, 20], [700, 300, 100, 100]],
                        coins: [[115, 260], [315, 160], [515, 60], [715, 260]],
                        spikes: [[150, 380], [350, 380], [550, 380]]
                    },
                    // Level 14
                    {
                        platforms: [[0, 350, 800, 20]],
                        coins: [[100, 310], [200, 310], [300, 310], [400, 310], [500, 310], [600, 310], [700, 310]],
                        spikes: [[50, 330], [150, 330], [250, 330], [350, 330], [450, 330], [550, 330], [650, 330], [750, 330]]
                    }
                ];

                const l = levels[Math.min(this.level - 1, levels.length - 1)];
                l.platforms.forEach(p => this.entities.push(new Platform(...p)));
                l.coins.forEach(c => this.entities.push(new Coin(...c)));
                l.spikes.forEach(s => this.entities.push(new Spike(...s)));
            }
            nextLevel() {
                this.level++;
                if (this.level > 14) {
                    this.state = 'won';
                    this.playSound(600, 0.5, 'sine');
                } else {
                    document.getElementById('level').innerText = this.level;
                    this.setupLevel();
                }
            }
            update(deltaTime) {
                super.update(deltaTime);

                // Win round condition
                const coinsRemaining = this.entities.filter(e => e instanceof Coin).length;
                if (coinsRemaining === 0) {
                    this.nextLevel();
                }

                this.entities = this.entities.filter(e => !e.markedForDeletion);
                this.clouds.forEach(c => {
                    c.x -= c.s;
                    if (c.x < -100) c.x = 850;
                });
            }
            draw() {
                // HUD for two players
                document.getElementById('coins').innerText = `P1: ${this.players[0].score} | P2: ${this.players[1].score}`;

                // Sky gradient
                const skyGrad = this.ctx.createLinearGradient(0, 0, 0, this.height);
                skyGrad.addColorStop(0, '#4fc3f7');
                skyGrad.addColorStop(1, '#e1f5fe');
                this.ctx.fillStyle = skyGrad;
                this.ctx.fillRect(0, 0, this.width, this.height);

                // Distant Mountains (Parallax Layer 1)
                this.ctx.fillStyle = '#90a4ae';
                this.mountains.forEach(m => {
                    const px = (m.x - this.entities[0].x * 0.1) % 1200;
                    this.ctx.beginPath();
                    this.ctx.moveTo(px, this.height);
                    this.ctx.lineTo(px + 200, this.height - m.h);
                    this.ctx.lineTo(px + 400, this.height);
                    this.ctx.fill();
                });

                // Clouds (Parallax Layer 2)
                this.ctx.fillStyle = '#fff';
                this.ctx.globalAlpha = 0.8;
                this.clouds.forEach(c => {
                    const cx = (c.x - this.entities[0].x * 0.3) % (this.width + 200) - 100;
                    this.ctx.beginPath();
                    this.ctx.arc(cx, c.y, c.w/3, 0, Math.PI*2);
                    this.ctx.arc(cx + c.w/4, c.y - c.w/5, c.w/3, 0, Math.PI*2);
                    this.ctx.arc(cx + c.w/2, c.y, c.w/3, 0, Math.PI*2);
                    this.ctx.fill();
                });
                this.ctx.globalAlpha = 1.0;

                if (this.showTrajectory) {
                    const traj = this.trajectories[Math.min(this.level - 1, this.trajectories.length - 1)];
                    this.ctx.strokeStyle = 'rgba(255, 0, 0, 0.5)';
                    this.ctx.setLineDash([5, 5]);
                    this.ctx.lineWidth = 2;
                    this.ctx.beginPath();
                    this.ctx.moveTo(traj[0].x, traj[0].y);
                    for (let i = 1; i < traj.length; i++) {
                        this.ctx.lineTo(traj[i].x, traj[i].y);
                    }
                    this.ctx.stroke();
                    this.ctx.setLineDash([]);
                }

                super.draw();
            }
        }

        const game = new PixelGame();
        document.body.addEventListener('keydown', () => {
            game.startMusic([
                {f: 261.63, d: 0.2}, {f: 329.63, d: 0.2}, {f: 392.00, d: 0.2}, {f: 523.25, d: 0.4}
            ]);
        }, { once: true });
        game.start();
    </script>
</body>
</html>
