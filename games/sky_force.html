<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Force - JNR</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        canvas {
            background-color: #01579b;
            border: 4px solid #333;
        }
        .ui {
            margin-bottom: 10px;
            font-size: 1.2rem;
            color: #00e436;
        }
        .back-link {
            margin-top: 10px;
            color: #444;
            text-decoration: none;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="ui">SCORE: <span id="score">0</span> | AMMO: <span id="ammo">1000</span> | BEST: <span id="best">0</span></div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <a href="../index.html" class="back-link">ESC TO MENU</a>

    <script src="../js/engine.js"></script>
    <script>
        class Bullet extends Entity {
            constructor(x, y) {
                super(x, y, 6, 12, '#fff');
                this.vy = -12;
            }
            update(game, deltaTime) {
                const dtScale = deltaTime / 16.67;
                this.y += this.vy * dtScale;
                if (this.y < -20) this.markedForDeletion = true;

                game.entities.forEach(e => {
                    if (e instanceof Enemy && this.collidesWith(e)) {
                        e.health--;
                        this.markedForDeletion = true;
                        game.playSound(600, 0.05, 'square');
                        if (e.health <= 0) {
                            e.markedForDeletion = true;
                            game.score += (e.type === 'heli' ? 150 : 75);
                            document.getElementById('score').innerText = game.score;
                            game.playSound(100, 0.2, 'sawtooth');
                            for(let i=0; i<15; i++) game.addParticle(e.x + e.width/2, e.y + e.height/2, '#ff5722');
                        } else {
                            for(let i=0; i<3; i++) game.addParticle(this.x, this.y, '#fff');
                        }
                    }
                });
            }
            draw(ctx) {
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.ellipse(this.x + 3, this.y + 6, 3, 6, 0, 0, Math.PI * 2);
                ctx.fill();
                // Glow
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#fff';
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        class PlayerPlane extends Entity {
            constructor() {
                super(180, 500, 44, 44, '#00e436');
                this.speed = 6;
                this.shootTimer = 0;
            }
            update(game, deltaTime) {
                const dtScale = deltaTime / 16.67;
                if (game.keys['ArrowLeft'] || game.keys['KeyA']) this.x -= this.speed * dtScale;
                if (game.keys['ArrowRight'] || game.keys['KeyD']) this.x += this.speed * dtScale;
                if (game.keys['ArrowUp'] || game.keys['KeyW']) this.y -= this.speed * dtScale;
                if (game.keys['ArrowDown'] || game.keys['KeyS']) this.y += this.speed * dtScale;

                if (this.x < 0) this.x = 0;
                if (this.x > game.width - this.width) this.x = game.width - this.width;
                if (this.y < 0) this.y = 0;
                if (this.y > game.height - this.height) this.y = game.height - this.height;

                this.shootTimer += deltaTime;
                if ((game.keys['Space'] || game.keys['KeyZ']) && this.shootTimer > 180 && game.ammo > 0) {
                    game.entities.push(new Bullet(this.x + this.width / 2 - 3, this.y));
                    game.ammo--;
                    document.getElementById('ammo').innerText = game.ammo;
                    this.shootTimer = 0;
                    game.playSound(800, 0.05, 'sine');
                }

                game.entities.forEach(e => {
                    if (e instanceof Enemy && this.collidesWith(e)) {
                        game.state = 'lost';
                        game.playDeathSound();
                        for(let i=0; i<30; i++) game.addParticle(this.x + 20, this.y + 20, '#ffeb3b');
                    }
                });
            }
            draw(ctx) {
                ctx.save();
                // Wings
                ctx.fillStyle = '#2e7d32';
                ctx.fillRect(this.x, this.y + 18, this.width, 8);
                // Body
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x + 16, this.y, 12, this.height);
                // Tail
                ctx.fillRect(this.x + 10, this.y + 36, 24, 4);
                // Cockpit
                ctx.fillStyle = '#81d4fa';
                ctx.fillRect(this.x + 19, this.y + 8, 6, 12);
                // Propeller effect
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 2;
                const r = (Date.now() * 0.02) % (Math.PI * 2);
                ctx.beginPath();
                ctx.moveTo(this.x + 22 - Math.cos(r) * 15, this.y);
                ctx.lineTo(this.x + 22 + Math.cos(r) * 15, this.y);
                ctx.stroke();
                ctx.restore();
            }
        }

        class Enemy extends Entity {
            constructor(x, type) {
                super(x, -60, 44, 44, '#d32f2f');
                this.type = type;
                this.health = type === 'heli' ? 3 : 1;
                this.vy = type === 'heli' ? 2 : 5;
                this.phase = Math.random() * Math.PI * 2;
            }
            update(game, deltaTime) {
                const dtScale = deltaTime / 16.67;
                this.y += this.vy * dtScale;
                if (this.type === 'heli') {
                    this.x += Math.sin(this.y / 60 + this.phase) * 3 * dtScale;
                    this.x = Math.max(10, Math.min(game.width - this.width - 10, this.x));
                }
                if (this.y > game.height) {
                    game.state = 'lost';
                    game.playDeathSound();
                }
                if (this.y > game.height + 100) this.markedForDeletion = true;
            }
            draw(ctx) {
                ctx.save();
                ctx.fillStyle = this.color;
                if (this.type === 'plane') {
                    // Wings
                    ctx.fillRect(this.x, this.y + 18, this.width, 8);
                    // Body
                    ctx.fillRect(this.x + 16, this.y, 12, this.height);
                    // Cockpit
                    ctx.fillStyle = '#1a1a1a';
                    ctx.fillRect(this.x + 19, this.y + 24, 6, 10);
                } else {
                    // Heli Body
                    ctx.fillStyle = '#c62828';
                    ctx.fillRect(this.x + 10, this.y + 12, 24, 20);
                    ctx.fillRect(this.x + 34, this.y + 18, 15, 6); // Tail
                    // Rotor
                    const r = (Date.now() * 0.03) % (Math.PI * 2);
                    ctx.strokeStyle = '#eee';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(this.x + 22 - Math.cos(r) * 25, this.y + 12);
                    ctx.lineTo(this.x + 22 + Math.cos(r) * 25, this.y + 12);
                    ctx.stroke();
                }
                ctx.restore();
            }
        }

        class Tower extends Enemy {
            constructor(x, y) {
                super(x, 'tower');
                this.y = y;
                this.health = 5;
                this.vy = 2; // Matches island speed
                this.shootTimer = 0;
                this.color = '#555';
            }
            update(game, deltaTime) {
                const dtScale = deltaTime / 16.67;
                this.y += this.vy * dtScale;
                if (this.y > game.height) {
                    game.state = 'lost';
                    game.playDeathSound();
                }
                this.shootTimer += deltaTime;
                if (this.shootTimer > 2000) {
                    const b = new Bullet(this.x + this.width / 2 - 3, this.y + this.height);
                    b.vy = 6;
                    b.color = '#ff0';
                    b.update = function(game, dt) {
                        const s = dt / 16.67;
                        this.y += this.vy * s;
                        if (this.y > game.height) this.markedForDeletion = true;
                        // Tower bullet hits player
                        const p = game.entities.find(e => e instanceof PlayerPlane);
                        if (p && this.collidesWith(p)) {
                            game.state = 'lost';
                            game.playDeathSound();
                        }
                    };
                    game.entities.push(b);
                    this.shootTimer = 0;
                }
                if (this.y > game.height + 200) this.markedForDeletion = true;
            }
            draw(ctx) {
                ctx.fillStyle = '#444';
                ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.fillStyle = '#666';
                ctx.fillRect(this.x + 10, this.y - 10, this.width - 20, 10);
                ctx.fillStyle = '#f00'; // Eye/Sensor
                ctx.fillRect(this.x + 15, this.y, 14, 10);
            }
        }

        class SkyGame extends Game {
            constructor() {
                super('gameCanvas', { gravity: 0, friction: 1, gameId: 'sky_force' });
                document.getElementById('best').innerText = this.highScore;
                this.score = 0;
                this.spawnTimer = 0;
                this.entities.push(new PlayerPlane());
                this.islands = [];
                this.oceanOffset = 0;
                this.ammo = 1000;
                this.spawnThreshold = 1200;
            }
            update(deltaTime) {
                super.update(deltaTime);
                const dtScale = deltaTime / 16.67;
                this.oceanOffset = (this.oceanOffset + 1 * dtScale) % 40;
                this.spawnTimer += deltaTime;
                this.spawnThreshold = Math.max(400, 1200 - this.score / 50);
                if (this.spawnTimer > this.spawnThreshold) {
                    const x = 20 + Math.random() * (this.width - 64);
                    const type = Math.random() > 0.75 ? 'heli' : 'plane';
                    this.entities.push(new Enemy(x, type));
                    this.spawnTimer = 0;
                }
                if (Math.random() < 0.015) {
                    const islX = Math.random() * this.width;
                    const islY = -150;
                    this.islands.push({
                        x: islX,
                        y: islY,
                        size: 40 + Math.random() * 80,
                        color: `rgb(0, ${120 + Math.random() * 60}, 0)`,
                        sand: `rgb(${200 + Math.random() * 55}, 180, 100)`
                    });
                    if (Math.random() < 0.3) {
                        this.entities.push(new Tower(islX - 22, islY - 22));
                    }
                }
                this.islands.forEach(isl => isl.y += 2 * dtScale);
                this.islands = this.islands.filter(isl => isl.y < this.height + 150);
                this.entities = this.entities.filter(e => !e.markedForDeletion);
            }
            draw() {
                // Ocean
                this.ctx.fillStyle = '#0277bd';
                this.ctx.fillRect(0, 0, this.width, this.height);

                // Subtle waves
                this.ctx.strokeStyle = 'rgba(255,255,255,0.05)';
                for(let y = -40; y < this.height; y += 40) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, y + this.oceanOffset);
                    for(let x = 0; x <= this.width; x += 20) {
                        this.ctx.lineTo(x, y + this.oceanOffset + Math.sin(x/20) * 5);
                    }
                    this.ctx.stroke();
                }

                this.islands.forEach(isl => {
                    // Sand/Shore
                    this.ctx.fillStyle = isl.sand;
                    this.ctx.beginPath();
                    this.ctx.arc(isl.x, isl.y, isl.size + 5, 0, Math.PI * 2);
                    this.ctx.fill();
                    // Island
                    this.ctx.fillStyle = isl.color;
                    this.ctx.beginPath();
                    this.ctx.arc(isl.x, isl.y, isl.size, 0, Math.PI * 2);
                    this.ctx.fill();
                    // Foliage detail
                    this.ctx.fillStyle = 'rgba(0,0,0,0.1)';
                    this.ctx.beginPath();
                    this.ctx.arc(isl.x + 10, isl.y + 10, isl.size * 0.7, 0, Math.PI * 2);
                    this.ctx.fill();
                });

                super.draw();
            }
        }

        const game = new SkyGame();
        document.body.addEventListener('keydown', () => {
            game.startMusic([
                {f: 349.23, d: 0.2}, {f: 392.00, d: 0.2}, {f: 440.00, d: 0.4},
                {f: 349.23, d: 0.2}, {f: 392.00, d: 0.2}, {f: 523.25, d: 0.4}
            ]);
        }, { once: true });
        game.start();
    </script>
</body>
</html>
