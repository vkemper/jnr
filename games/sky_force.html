<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Force - JNR</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #001, #003);
        }
        canvas {
            background-color: #00051a;
            border: 4px solid #fff;
        }
        .ui {
            margin-bottom: 10px;
            font-size: 1.2rem;
            color: #29adff;
        }
        .back-link {
            margin-top: 10px;
            color: #444;
            text-decoration: none;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="ui">SCORE: <span id="score">0</span> | SPACE TO SHOOT</div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <a href="../index.html" class="back-link">ESC TO MENU</a>

    <script src="../js/engine.js"></script>
    <script>
        class Ship extends Entity {
            constructor() {
                super(180, 500, 40, 40, '#29adff');
                this.speed = 8;
                this.shootCooldown = 0;
            }
            update(game, deltaTime) {
                if (game.keys['ArrowLeft'] || game.keys['KeyA']) this.x -= this.speed;
                if (game.keys['ArrowRight'] || game.keys['KeyD']) this.x += this.speed;
                if (game.keys['ArrowUp'] || game.keys['KeyW']) this.y -= this.speed;
                if (game.keys['ArrowDown'] || game.keys['KeyS']) this.y += this.speed;

                if (this.x < 0) this.x = 0;
                if (this.x > game.width - this.width) this.x = game.width - this.width;
                if (this.y < 0) this.y = 0;
                if (this.y > game.height - this.height) this.y = game.height - this.height;

                if (game.keys['Space'] && this.shootCooldown <= 0) {
                    game.entities.push(new Bullet(this.x + this.width / 2 - 2, this.y));
                    game.playShootSound();
                    this.shootCooldown = 300;
                }
                if (this.shootCooldown > 0) this.shootCooldown -= deltaTime;

                game.entities.forEach(e => {
                    if (e instanceof Asteroid && this.collidesWith(e)) {
                        game.state = 'lost';
                        game.playDeathSound();
                    }
                });
            }
            draw(ctx) {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.moveTo(this.x + 20, this.y);
                ctx.lineTo(this.x, this.y + 40);
                ctx.lineTo(this.x + 40, this.y + 40);
                ctx.closePath();
                ctx.fill();
            }
        }

        class Bullet extends Entity {
            constructor(x, y) {
                super(x, y, 4, 10, '#ffa300');
            }
            update(game) {
                this.y -= 10;
                if (this.y < -20) this.markedForDeletion = true;

                game.entities.forEach(e => {
                    if (e instanceof Asteroid && this.collidesWith(e)) {
                        e.markedForDeletion = true;
                        this.markedForDeletion = true;
                        game.score += 50;
                        document.getElementById('score').innerText = game.score;
                    }
                });
            }
        }

        class Asteroid extends Entity {
            constructor(x, speed) {
                super(x, -100, 30 + Math.random() * 30, 30 + Math.random() * 30, '#5f574f');
                this.vy = speed;
            }
            update(game) {
                this.y += this.vy;
                if (this.y > game.height) {
                    this.markedForDeletion = true;
                    game.score += 10;
                    document.getElementById('score').innerText = game.score;
                }
            }
            draw(ctx) {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x + this.width/2, this.y + this.height/2, this.width/2, 0, Math.PI*2);
                ctx.fill();
            }
        }

        class SkyGame extends Game {
            constructor() {
                super('gameCanvas', { gravity: 0, friction: 1 });
                this.score = 0;
                this.spawnTimer = 0;
                this.entities.push(new Ship());
                this.stars = Array.from({length: 50}, () => ({
                    x: Math.random() * this.width,
                    y: Math.random() * this.height,
                    s: 1 + Math.random() * 2
                }));
            }
            update(deltaTime) {
                super.update(deltaTime);
                this.spawnTimer += deltaTime;
                if (this.spawnTimer > 800) {
                    this.entities.push(new Asteroid(Math.random() * (this.width - 40), 2 + Math.random() * 4));
                    this.spawnTimer = 0;
                }
                this.entities = this.entities.filter(e => !e.markedForDeletion);

                this.stars.forEach(s => {
                    s.y += s.s;
                    if (s.y > this.height) s.y = 0;
                });
            }
            draw() {
                // Background stars
                this.ctx.fillStyle = '#fff';
                this.stars.forEach(s => {
                    this.ctx.fillRect(s.x, s.y, s.s, s.s);
                });
                super.draw();
            }
        }

        const game = new SkyGame();
        document.body.addEventListener('keydown', () => {
            game.startMusic([
                {f: 392.00, d: 0.2}, {f: 349.23, d: 0.2}, {f: 329.63, d: 0.2}, {f: 293.66, d: 0.2},
                {f: 261.63, d: 0.4}, {f: 293.66, d: 0.4}, {f: 329.63, d: 0.4}
            ]);
        }, { once: true });
        game.start();
    </script>
</body>
</html>
