<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Force - JNR</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        canvas {
            background-color: #004;
            border: 4px solid #333;
        }
        .ui {
            margin-bottom: 10px;
            font-size: 1.2rem;
            color: #00e436;
        }
        .back-link {
            margin-top: 10px;
            color: #444;
            text-decoration: none;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="ui">SCORE: <span id="score">0</span> | BEST: <span id="best">0</span></div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <a href="../index.html" class="back-link">ESC TO MENU</a>

    <script src="../js/engine.js"></script>
    <script>
        class Bullet extends Entity {
            constructor(x, y) {
                super(x, y, 4, 10, '#fff');
                this.vy = -10;
            }
            update(game) {
                this.y += this.vy;
                if (this.y < -20) this.markedForDeletion = true;

                game.entities.forEach(e => {
                    if (e instanceof Enemy && this.collidesWith(e)) {
                        e.health--;
                        this.markedForDeletion = true;
                        game.playSound(600, 0.05, 'square');
                        if (e.health <= 0) {
                            e.markedForDeletion = true;
                            game.score += (e.type === 'heli' ? 150 : 75);
                            document.getElementById('score').innerText = game.score;
                            game.playSound(100, 0.2, 'sawtooth');
                        }
                    }
                });
            }
        }

        class PlayerPlane extends Entity {
            constructor() {
                super(180, 500, 40, 40, '#00e436');
                this.speed = 6;
                this.shootTimer = 0;
            }
            update(game) {
                if (game.keys['ArrowLeft'] || game.keys['KeyA']) this.x -= this.speed;
                if (game.keys['ArrowRight'] || game.keys['KeyD']) this.x += this.speed;
                if (game.keys['ArrowUp'] || game.keys['KeyW']) this.y -= this.speed;
                if (game.keys['ArrowDown'] || game.keys['KeyS']) this.y += this.speed;

                if (this.x < 0) this.x = 0;
                if (this.x > game.width - this.width) this.x = game.width - this.width;
                if (this.y < 0) this.y = 0;
                if (this.y > game.height - this.height) this.y = game.height - this.height;

                this.shootTimer += 16;
                if ((game.keys['Space'] || game.keys['KeyZ']) && this.shootTimer > 200) {
                    game.entities.push(new Bullet(this.x + this.width / 2 - 2, this.y));
                    this.shootTimer = 0;
                    game.playSound(800, 0.05, 'sine');
                }

                game.entities.forEach(e => {
                    if (e instanceof Enemy && this.collidesWith(e)) {
                        game.state = 'lost';
                        game.playDeathSound();
                    }
                });
            }
            draw(ctx) {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y + 15, this.width, 10);
                ctx.fillRect(this.x + 15, this.y, 10, this.height);
                ctx.fillRect(this.x + 10, this.y + 35, 20, 5);
                ctx.fillStyle = '#fff';
                ctx.fillRect(this.x + 17, this.y + 10, 6, 8);
            }
        }

        class Enemy extends Entity {
            constructor(x, type) {
                super(x, -50, 40, 40, '#ff004d');
                this.type = type;
                this.health = type === 'heli' ? 3 : 1;
                this.vy = type === 'heli' ? 2 : 4;
                this.phase = Math.random() * Math.PI * 2;
            }
            update(game) {
                this.y += this.vy;
                if (this.type === 'heli') {
                    this.x += Math.sin(this.y / 50 + this.phase) * 2;
                }
                if (this.y > game.height) this.markedForDeletion = true;
            }
            draw(ctx) {
                ctx.fillStyle = this.color;
                if (this.type === 'plane') {
                    ctx.fillRect(this.x, this.y + 15, this.width, 10);
                    ctx.fillRect(this.x + 15, this.y, 10, this.height);
                } else {
                    ctx.fillRect(this.x + 5, this.y + 10, 30, 20);
                    ctx.fillRect(this.x + 30, this.y + 15, 15, 5);
                    const r = (Date.now() / 50) % (Math.PI * 2);
                    ctx.strokeStyle = '#fff';
                    ctx.beginPath();
                    ctx.moveTo(this.x + 20 - Math.cos(r) * 20, this.y + 10);
                    ctx.lineTo(this.x + 20 + Math.cos(r) * 20, this.y + 10);
                    ctx.stroke();
                }
            }
        }

        class SkyGame extends Game {
            constructor() {
                super('gameCanvas', { gravity: 0, friction: 1, gameId: 'sky_force' });
                document.getElementById('best').innerText = this.highScore;
                this.score = 0;
                this.spawnTimer = 0;
                this.entities.push(new PlayerPlane());
                this.islands = [];
            }
            update(deltaTime) {
                super.update(deltaTime);
                this.spawnTimer += deltaTime;
                if (this.spawnTimer > 1000) {
                    const x = Math.random() * (this.width - 40);
                    const type = Math.random() > 0.7 ? 'heli' : 'plane';
                    this.entities.push(new Enemy(x, type));
                    this.spawnTimer = 0;
                }
                if (Math.random() < 0.01) {
                    this.islands.push({
                        x: Math.random() * this.width,
                        y: -100,
                        size: 40 + Math.random() * 60,
                        color: `rgb(0, ${100 + Math.random() * 50}, 0)`
                    });
                }
                this.islands.forEach(isl => isl.y += 1);
                this.islands = this.islands.filter(isl => isl.y < this.height + 100);
                this.entities = this.entities.filter(e => !e.markedForDeletion);
            }
            draw() {
                // Background Gradient
                const grad = this.ctx.createLinearGradient(0, 0, 0, this.height);
                grad.addColorStop(0, '#001');
                grad.addColorStop(1, '#004');
                this.ctx.fillStyle = grad;
                this.ctx.fillRect(0, 0, this.width, this.height);

                this.islands.forEach(isl => {
                    this.ctx.fillStyle = isl.color;
                    this.ctx.beginPath();
                    this.ctx.arc(isl.x, isl.y, isl.size, 0, Math.PI * 2);
                    this.ctx.fill();
                    // Detail on island
                    this.ctx.fillStyle = 'rgba(0,0,0,0.1)';
                    this.ctx.beginPath();
                    this.ctx.arc(isl.x + 5, isl.y + 5, isl.size * 0.8, 0, Math.PI * 2);
                    this.ctx.fill();
                });
                super.draw();
            }
        }

        const game = new SkyGame();
        document.body.addEventListener('keydown', () => {
            game.startMusic([
                {f: 349.23, d: 0.2}, {f: 392.00, d: 0.2}, {f: 440.00, d: 0.4},
                {f: 349.23, d: 0.2}, {f: 392.00, d: 0.2}, {f: 523.25, d: 0.4}
            ]);
        }, { once: true });
        game.start();
    </script>
</body>
</html>
