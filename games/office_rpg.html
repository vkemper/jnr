<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office RPG: Alien Insurance - JNR</title>
    <style>
        body { background: #1a1a1a; color: #fff; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        canvas { background: #2c3e50; border: 4px solid #34495e; image-rendering: pixelated; cursor: crosshair; }
        .ui-overlay { position: absolute; top: 20px; left: 20px; pointer-events: none; }
        .stats { font-size: 1.2rem; text-shadow: 2px 2px #000; }
        .dialog-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 800px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #fff;
            padding: 20px;
            display: none;
            flex-direction: column;
        }
        .dialog-text { font-size: 1.1rem; line-height: 1.4; margin-bottom: 10px; color: #0f0; }
        .dialog-input {
            background: #111;
            border: 1px solid #444;
            color: #fff;
            padding: 10px;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
        }
        .back-link { margin-top: 10px; color: #444; text-decoration: none; font-size: 0.8rem; }
        .quest-log {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border: 1px solid #555;
            max-width: 250px;
        }
        .quest-item { font-size: 0.9rem; margin-bottom: 5px; }
        .quest-completed { text-decoration: line-through; color: #888; }

        .api-modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #2c3e50;
            border: 4px solid #34495e;
            padding: 30px;
            z-index: 1000;
            display: none;
            flex-direction: column;
            width: 400px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        .api-modal h2 { margin-top: 0; color: #ffa300; }
        .api-modal p { font-size: 0.9rem; color: #bdc3c7; line-height: 1.4; }
        .api-modal input {
            background: #111;
            border: 1px solid #444;
            color: #fff;
            padding: 12px;
            margin: 15px 0;
            font-family: inherit;
        }
        .api-modal button {
            background: #27ae60;
            color: #fff;
            border: none;
            padding: 12px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
        }
        .api-modal button:hover { background: #2ecc71; }
        .api-modal .cancel-btn { background: transparent; color: #888; font-size: 0.8rem; margin-top: 10px; text-decoration: underline; border: none; }
    </style>
</head>
<body>
    <div class="ui-overlay">
        <div class="stats">OFFICE RPG: ALIEN INSURANCE</div>
    </div>

    <div class="quest-log" id="questLog">
        <div style="font-weight: bold; margin-bottom: 5px; color: #ffa300;">QUESTS</div>
        <div id="questList"></div>
    </div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <div class="dialog-container" id="dialogContainer">
        <div id="characterName" style="font-weight: bold; color: #29adff; margin-bottom: 5px;">Name</div>
        <div class="dialog-text" id="dialogText">Hello there!</div>
        <input type="text" class="dialog-input" id="dialogInput" placeholder="Type your response..." autocomplete="off">
    </div>

    <div class="api-modal" id="apiModal">
        <h2>GEMINI API KEY REQUIRED</h2>
        <p>To enable interactive NPC dialogues, please provide a Google AI Studio API key. Your key is stored locally in your browser and never sent elsewhere.</p>
        <p style="font-size: 0.75rem;">Get one for free at: <a href="https://aistudio.google.com/app/apikey" target="_blank" style="color: #29adff;">aistudio.google.com</a></p>
        <input type="password" id="apiKeyInput" placeholder="Enter API Key here...">
        <button id="saveApiKeyBtn">SAVE AND ENABLE AI</button>
        <button class="cancel-btn" id="skipApiKeyBtn">CONTINUE WITHOUT AI</button>
    </div>

    <a href="../index.html" class="back-link">ESC TO MENU</a>

    <script src="../js/engine.js"></script>
    <script>
        // API Configuration
        let API_KEY = window.localStorage.getItem('GOOGLE_AI_KEY') || "";

        class OfficePlayer extends Entity {
            constructor(x, y) {
                super(x, y, 32, 32, '#3498db');
                this.speed = 3;
            }

            update(game, deltaTime) {
                if (game.isDialogOpen) return;

                let oldX = this.x;
                let oldY = this.y;
                let mvX = 0;
                let mvY = 0;

                if (game.keys['ArrowUp'] || game.keys['KeyW']) mvY -= 1;
                if (game.keys['ArrowDown'] || game.keys['KeyS']) mvY += 1;
                if (game.keys['ArrowLeft'] || game.keys['KeyA']) mvX -= 1;
                if (game.keys['ArrowRight'] || game.keys['KeyD']) mvX += 1;

                // Normalize movement
                if (mvX !== 0 && mvY !== 0) {
                    const mag = Math.sqrt(mvX * mvX + mvY * mvY);
                    mvX /= mag;
                    mvY /= mag;
                }

                this.x += mvX * this.speed;
                this.y += mvY * this.speed;

                // Collision with boundaries
                if (this.x < 0) this.x = 0;
                if (this.y < 0) this.y = 0;
                if (this.x > game.width - this.width) this.x = game.width - this.width;
                if (this.y > game.height - this.height) this.y = game.height - this.height;

                // Collision with furniture (to be added)
                game.entities.forEach(e => {
                    if (e !== this && e.solid && this.collidesWith(e)) {
                        this.x = oldX;
                        this.y = oldY;
                    }
                });

                // Interaction check
                if (game.keys['Space'] || game.keys['KeyE']) {
                    game.checkInteraction();
                }
            }

            draw(ctx) {
                // Draw software engineer character
                ctx.fillStyle = '#f39c12'; // Skin
                ctx.fillRect(this.x + 8, this.y, 16, 16);
                ctx.fillStyle = '#2980b9'; // Shirt
                ctx.fillRect(this.x + 4, this.y + 16, 24, 16);
                ctx.fillStyle = '#333'; // Hair
                ctx.fillRect(this.x + 8, this.y, 16, 4);
                // Glasses
                ctx.fillStyle = '#000';
                ctx.fillRect(this.x + 10, this.y + 8, 4, 2);
                ctx.fillRect(this.x + 18, this.y + 8, 4, 2);
            }
        }

        class Furniture extends Entity {
            constructor(x, y, w, h, color, name = 'Furniture') {
                super(x, y, w, h, color);
                this.solid = true;
                this.name = name;
            }
        }

        class NPC extends Entity {
            constructor(x, y, color, name, role, traits) {
                super(x, y, 32, 32, color);
                this.name = name;
                this.role = role;
                this.traits = traits;
                this.solid = true;
                this.history = []; // Conversation history
            }
            draw(ctx) {
                // Body
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x + 4, this.y, 24, 32);
                // Head
                ctx.fillStyle = '#f1c40f';
                ctx.fillRect(this.x + 8, this.y - 8, 16, 16);
                // Name tag
                ctx.fillStyle = '#fff';
                ctx.font = '10px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(this.name, this.x + 16, this.y - 12);
            }
        }

        class Camera {
            constructor(width, height, mapWidth, mapHeight) {
                this.x = 0;
                this.y = 0;
                this.width = width;
                this.height = height;
                this.mapWidth = mapWidth;
                this.mapHeight = mapHeight;
            }

            follow(entity) {
                this.x = entity.x + entity.width / 2 - this.width / 2;
                this.y = entity.y + entity.height / 2 - this.height / 2;
                this.x = Math.max(0, Math.min(this.x, this.mapWidth - this.width));
                this.y = Math.max(0, Math.min(this.y, this.mapHeight - this.height));
            }
        }

        class OfficeGame extends Game {
            constructor() {
                super('gameCanvas', { gravity: 0, friction: 1, gameId: 'office_rpg' });
                this.worldWidth = 2000;
                this.worldHeight = 1500;
                this.camera = new Camera(this.width, this.height, this.worldWidth, this.worldHeight);
                this.isDialogOpen = false;
                this.activeNPC = null;
                this.player = new OfficePlayer(100, 100);
                this.entities.push(this.player);
                this.quests = [];
                this.setupMap();
                this.setupNPCs();
                this.setupQuests();
                this.bindUI();
            }

            setupMap() {
                // Walls
                this.entities.push(new Furniture(0, 0, this.worldWidth, 40, '#2c3e50', 'North Wall'));
                this.entities.push(new Furniture(0, this.worldHeight - 40, this.worldWidth, 40, '#2c3e50', 'South Wall'));
                this.entities.push(new Furniture(0, 0, 40, this.worldHeight, '#2c3e50', 'West Wall'));
                this.entities.push(new Furniture(this.worldWidth - 40, 0, 40, this.worldHeight, '#2c3e50', 'East Wall'));

                // Inner Rooms/Partitions
                this.entities.push(new Furniture(500, 0, 40, 400, '#2c3e50', 'Partition'));
                this.entities.push(new Furniture(500, 550, 40, 950, '#2c3e50', 'Partition'));

                this.entities.push(new Furniture(1000, 0, 40, 800, '#2c3e50', 'Partition'));
                this.entities.push(new Furniture(1000, 1000, 40, 500, '#2c3e50', 'Partition'));

                this.entities.push(new Furniture(1500, 400, 500, 40, '#2c3e50', 'Partition'));

                // Desks and decorations (more varied)
                for(let i = 0; i < 25; i++) {
                    const col = i % 5;
                    const row = Math.floor(i / 5);
                    const x = 100 + col * 380 + (row % 2) * 50;
                    const y = 100 + row * 280;

                    // Skip if inside a partition
                    if ((x > 460 && x < 540) || (x > 960 && x < 1040)) continue;

                    this.entities.push(new Furniture(x, y, 100, 50, '#7f8c8d', 'Desk'));
                    this.entities.push(new Furniture(x + 30, y - 25, 40, 25, '#34495e', 'Chair'));

                    if (i % 3 === 0) {
                        this.entities.push(new Furniture(x + 110, y + 10, 30, 30, '#27ae60', 'Plant'));
                    }
                }

                // Breakroom
                this.entities.push(new Furniture(1600, 100, 150, 40, '#e67e22', 'Coffee Machine'));
                this.entities.push(new Furniture(1600, 150, 300, 80, '#95a5a6', 'Dining Table'));

                // Server Room
                this.entities.push(new Furniture(1600, 1100, 60, 120, '#2ecc71', 'Server Rack 1'));
                this.entities.push(new Furniture(1700, 1100, 60, 120, '#2ecc71', 'Server Rack 2'));
                this.entities.push(new Furniture(1800, 1100, 60, 120, '#2ecc71', 'Server Rack 3'));
            }

            setupNPCs() {
                const npcData = [
                    { x: 250, y: 150, color: '#e67e22', name: 'Bob', role: 'Manager', traits: 'Stressed, obsessed with deadlines, suspects something is wrong with the coffee.' },
                    { x: 600, y: 200, color: '#9b59b6', name: 'Alice', role: 'QA Lead', traits: 'Meticulous, loves logic, notices small glitches in reality.' },
                    { x: 1000, y: 180, color: '#1abc9c', name: 'Dave', role: 'Senior Dev', traits: 'Cynical, tired, thinks the new "CEO" is just a very tall lizard in a suit.' },
                    { x: 1400, y: 220, color: '#f1c40f', name: 'Sarah', role: 'HR', traits: 'Overly cheerful, uses corporate jargon to hide her fear of the "restructuring".' },
                    { x: 1800, y: 150, color: '#e74c3c', name: 'Kevin', role: 'IT Support', traits: 'Knows everything about the servers, including the weird slime growing on them.' },
                    { x: 300, y: 600, color: '#34495e', name: 'Gus', role: 'Janitor', traits: 'Old-timer, has seen "the things from the vents", speaks in riddles.' },
                    { x: 700, y: 550, color: '#95a5a6', name: 'Leo', role: 'Intern', traits: 'Eager to please, oblivious to the aliens, just happy to have a job.' },
                    { x: 1100, y: 650, color: '#d35400', name: 'Martha', role: 'Accounting', traits: 'Strict, follows the money, notices payments to "The Hive Mother".' },
                    { x: 1500, y: 580, color: '#c0392b', name: 'Chloe', role: 'Marketing', traits: 'Trying to brand the alien infestation as a "dynamic synergy".' },
                    { x: 100, y: 1000, color: '#2ecc71', name: 'Rita', role: 'Receptionist', traits: 'Professional, calm, even when visitors have four arms.' },
                    { x: 500, y: 1100, color: '#8e44ad', name: 'Ben', role: 'Legal', traits: 'Working on NDAs for intergalactic incidents.' },
                    { x: 900, y: 1050, color: '#2c3e50', name: 'Pam', role: 'PR', traits: 'Spinning the "disappearance" of the previous board of directors.' },
                    { x: 1300, y: 1150, color: '#bdc3c7', name: 'Security', role: 'Guard', traits: 'Bored, more worried about his lunch than the aliens.' },
                    { x: 1700, y: 1000, color: '#7f8c8d', name: 'Vance', role: 'Sales', traits: 'Would sell insurance to a Black Hole.' },
                    { x: 1000, y: 1400, color: '#000', name: 'Mr. Xylth', role: 'CEO', traits: 'Definitely an alien, struggles with human metaphors, speaks with a slight hiss.' }
                ];

                npcData.forEach(data => {
                    this.entities.push(new NPC(data.x, data.y, data.color, data.name, data.role, data.traits));
                });
            }

            setupQuests() {
                this.addQuest('bug_discovery', 'Talk to Alice about the claim system bug.', true);
                this.addQuest('coffee_clue', 'Investigate the breakroom for Bob.', false);
                this.addQuest('server_slime', 'Check the server room for "weird growth" for Kevin.', false);
            }

            addQuest(id, description, active = false) {
                if (!this.quests.find(q => q.id === id)) {
                    this.quests.push({ id, description, completed: false, active });
                    this.updateQuestLog();
                }
            }

            completeQuest(id) {
                const quest = this.quests.find(q => q.id === id);
                if (quest && !quest.completed) {
                    quest.completed = true;
                    this.playSound(800, 0.2); // Success sound
                    this.updateQuestLog();
                }
            }

            updateQuestLog() {
                const list = document.getElementById('questList');
                list.innerHTML = '';
                this.quests.forEach(q => {
                    if (q.active || q.completed) {
                        const div = document.createElement('div');
                        div.className = 'quest-item' + (q.completed ? ' quest-completed' : '');
                        div.innerText = (q.completed ? '[X] ' : '[ ] ') + q.description;
                        list.appendChild(div);
                    }
                });
            }

            bindUI() {
                const input = document.getElementById('dialogInput');
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && input.value.trim() !== '') {
                        this.handlePlayerDialog(input.value);
                        input.value = '';
                    }
                    if (e.key === 'Escape') {
                        this.closeDialog();
                    }
                });

                // API Modal UI
                const modal = document.getElementById('apiModal');
                const keyInput = document.getElementById('apiKeyInput');
                const saveBtn = document.getElementById('saveApiKeyBtn');
                const skipBtn = document.getElementById('skipApiKeyBtn');

                if (!API_KEY) {
                    modal.style.display = 'flex';
                }

                saveBtn.onclick = () => {
                    const key = keyInput.value.trim();
                    if (key) {
                        API_KEY = key;
                        window.localStorage.setItem('GOOGLE_AI_KEY', key);
                        modal.style.display = 'none';
                        this.playSound(1000, 0.1);
                    }
                };

                skipBtn.onclick = () => {
                    modal.style.display = 'none';
                };
            }

            checkInteraction() {
                const interactionDist = 40;
                let closestNPC = null;
                let minDist = interactionDist;

                this.entities.forEach(e => {
                    if (e instanceof NPC) {
                        const dist = Math.sqrt(Math.pow(this.player.x - e.x, 2) + Math.pow(this.player.y - e.y, 2));
                        if (dist < minDist) {
                            minDist = dist;
                            closestNPC = e;
                        }
                    }
                });

                if (closestNPC) {
                    this.openDialog(closestNPC);
                }
            }

            openDialog(npc) {
                this.activeNPC = npc;
                this.isDialogOpen = true;
                document.getElementById('dialogContainer').style.display = 'flex';
                document.getElementById('characterName').innerText = npc.name + ' (' + npc.role + ')';

                if (!API_KEY) {
                    document.getElementById('dialogText').innerText = `Hello! I'm ${npc.name}. (Note: AI Dialogues are disabled because no API key is set. You can set it in the console or refresh to see the prompt.)`;
                    document.getElementById('dialogInput').style.display = 'none';
                } else {
                    document.getElementById('dialogText').innerText = `Hello! I'm ${npc.name}. How can I help you with your tasks today?`;
                    document.getElementById('dialogInput').style.display = 'block';
                    document.getElementById('dialogInput').focus();
                }
            }

            closeDialog() {
                this.isDialogOpen = false;
                this.activeNPC = null;
                document.getElementById('dialogContainer').style.display = 'none';
            }

            async handlePlayerDialog(text) {
                if (!this.activeNPC) return;

                const dialogTextElem = document.getElementById('dialogText');
                dialogTextElem.innerText = "Thinking...";
                dialogTextElem.style.color = "#888";

                // Basic Input Sanitization (OWASP Mitigation)
                const sanitizedText = text.replace(/<[^>]*>?/gm, '').substring(0, 200);

                const systemPrompt = `You are ${this.activeNPC.name}, a ${this.activeNPC.role} in an alien-infested insurance office.
                Your traits: ${this.activeNPC.traits}.
                The player is a software engineer investigating weird occurrences.
                Keep responses short (1-3 sentences), in character, and slightly mysterious or corporate-dystopian.
                Do not break character. Do not mention being an AI.
                Current Quests: ${this.quests.filter(q => q.active && !q.completed).map(q => q.description).join(", ")}.`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [
                                { role: "user", parts: [{ text: `System: ${systemPrompt}` }] },
                                ...this.activeNPC.history.map(h => ({
                                    role: h.role === 'user' ? 'user' : 'model',
                                    parts: [{ text: h.text }]
                                })),
                                { role: "user", parts: [{ text: sanitizedText }] }
                            ],
                            safetySettings: [
                                { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_MEDIUM_AND_ABOVE" },
                                { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_MEDIUM_AND_ABOVE" },
                                { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_MEDIUM_AND_ABOVE" },
                                { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_MEDIUM_AND_ABOVE" }
                            ]
                        })
                    });

                    const data = await response.json();

                    if (data.error) {
                        throw new Error(data.error.message);
                    }

                    const reply = data.candidates[0].content.parts[0].text;

                    // Update history
                    this.activeNPC.history.push({ role: 'user', text: sanitizedText });
                    this.activeNPC.history.push({ role: 'model', text: reply });
                    if (this.activeNPC.history.length > 10) this.activeNPC.history.shift();

                    dialogTextElem.innerText = reply;
                    dialogTextElem.style.color = "#0f0";

                    // Check for quest progression based on keywords in reply (simple heuristic)
                    this.checkQuestProgression(reply);

                } catch (err) {
                    console.error("LLM Error:", err);
                    if (!API_KEY) {
                         dialogTextElem.innerText = "Error: No API Key found. Please run 'localStorage.setItem(\"GOOGLE_AI_KEY\", \"your_key_here\")' in the console or set it in the code.";
                    } else {
                         dialogTextElem.innerText = "Error: " + (err.message.includes("API_KEY") ? "Invalid API Key." : "The character is too stunned to speak...");
                    }
                    dialogTextElem.style.color = "#f00";
                }
            }

            checkQuestProgression(reply) {
                const lowerReply = reply.toLowerCase();
                if (this.activeNPC.name === 'Alice' && (lowerReply.includes('bug') || lowerReply.includes('claim'))) {
                    this.completeQuest('bug_discovery');
                    this.quests.find(q => q.id === 'coffee_clue').active = true;
                    this.updateQuestLog();
                }
                if (this.activeNPC.name === 'Bob' && (lowerReply.includes('coffee') || lowerReply.includes('breakroom'))) {
                    this.completeQuest('coffee_clue');
                    this.quests.find(q => q.id === 'server_slime').active = true;
                    this.updateQuestLog();
                }
                if (this.activeNPC.name === 'Kevin' && (lowerReply.includes('slime') || lowerReply.includes('server'))) {
                    this.completeQuest('server_slime');
                }
            }

            update(deltaTime) {
                super.update(deltaTime);
                this.camera.follow(this.player);
            }

            draw() {
                this.ctx.save();
                this.ctx.translate(-this.camera.x, -this.camera.y);

                // Draw floor
                this.ctx.fillStyle = '#34495e';
                this.ctx.fillRect(0, 0, this.worldWidth, this.worldHeight);

                // Grid floor
                this.ctx.strokeStyle = '#2c3e50';
                this.ctx.lineWidth = 1;
                for(let i=0; i<this.worldWidth; i+=80) {
                    for(let j=0; j<this.worldHeight; j+=80) {
                        this.ctx.strokeRect(i, j, 80, 80);
                    }
                }

                // Draw entities
                this.entities.forEach(entity => {
                    entity.draw(this.ctx);
                });
                this.drawParticles();

                this.ctx.restore();

                if (this.state !== 'playing') {
                    // Draw end game screen (inherited but we might want to override)
                    super.draw();
                }
            }
        }

        const game = new OfficeGame();
        game.start();
    </script>
</body>
</html>
