<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Racer - JNR</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        canvas {
            background-color: #111;
            border: 4px solid #333;
        }
        .ui {
            margin-bottom: 10px;
            font-size: 1.2rem;
            color: #00e436;
        }
        .back-link {
            margin-top: 10px;
            color: #444;
            text-decoration: none;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="ui">SCORE: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <a href="../index.html" class="back-link">ESC TO MENU</a>

    <script src="../js/engine.js"></script>
    <script>
        class Car extends Entity {
            constructor() {
                super(180, 500, 40, 70, '#00e436');
                this.speed = 7;
            }
            update(game) {
                if (game.keys['ArrowLeft'] || game.keys['KeyA']) this.vx = -this.speed;
                if (game.keys['ArrowRight'] || game.keys['KeyD']) this.vx = this.speed;

                this.x += this.vx;
                this.vx *= 0.8;

                if (this.x < 50) this.x = 50;
                if (this.x > game.width - 90) this.x = game.width - 90;

                game.entities.forEach(e => {
                    if (e instanceof Obstacle && this.collidesWith(e)) {
                        game.state = 'lost';
                        game.playDeathSound();
                    }
                });
            }
            draw(ctx) {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.width, this.height);
                // Windows
                ctx.fillStyle = '#000';
                ctx.fillRect(this.x + 5, this.y + 15, 30, 20);
                // Lights
                ctx.fillStyle = '#fff';
                ctx.fillRect(this.x + 5, this.y, 10, 5);
                ctx.fillRect(this.x + 25, this.y, 10, 5);
            }
        }

        class Obstacle extends Entity {
            constructor(x, speed) {
                super(x, -100, 40, 70, '#ff004d');
                this.vy = speed;
            }
            update(game) {
                this.y += this.vy;
                if (this.y > game.height) {
                    this.markedForDeletion = true;
                    game.score += 10;
                    document.getElementById('score').innerText = game.score;
                }
            }
        }

        class RacerGame extends Game {
            constructor() {
                super('gameCanvas', { gravity: 0, friction: 1 });
                this.score = 0;
                this.spawnTimer = 0;
                this.entities.push(new Car());
                this.roadOffset = 0;
            }
            update(deltaTime) {
                super.update(deltaTime);
                this.spawnTimer += deltaTime;
                if (this.spawnTimer > 1000) {
                    const x = 50 + Math.random() * (this.width - 140);
                    this.entities.push(new Obstacle(x, 5 + Math.random() * 5));
                    this.spawnTimer = 0;
                }
                this.entities = this.entities.filter(e => !e.markedForDeletion);
                this.roadOffset = (this.roadOffset + 5) % 40;
            }
            draw() {
                // Draw road
                this.ctx.fillStyle = '#222';
                this.ctx.fillRect(50, 0, this.width - 100, this.height);
                // Lines
                this.ctx.strokeStyle = '#fff';
                this.ctx.setLineDash([20, 20]);
                this.ctx.lineDashOffset = -this.roadOffset;
                this.ctx.beginPath();
                this.ctx.moveTo(this.width / 2, 0);
                this.ctx.lineTo(this.width / 2, this.height);
                this.ctx.stroke();
                this.ctx.setLineDash([]);

                super.draw();
            }
        }

        const game = new RacerGame();
        document.body.addEventListener('keydown', () => {
            game.startMusic([
                {f: 146.83, d: 0.2}, {f: 146.83, d: 0.2}, {f: 293.66, d: 0.4},
                {f: 220.00, d: 0.2}, {f: 220.00, d: 0.2}, {f: 440.00, d: 0.4}
            ]);
        }, { once: true });
        game.start();
    </script>
</body>
</html>
