<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Dash - JNR</title>
    <style>
        body {
            background-color: #0c0c0c;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: radial-gradient(circle, #1a1a2e 0%, #000 100%);
            overflow: hidden;
        }
        canvas {
            background-color: #000;
            border: 4px solid #e94560;
            box-shadow: 0 0 50px rgba(233, 69, 96, 0.3);
        }
        .hud {
            margin-bottom: 10px;
            font-size: 1.2rem;
            color: #e94560;
            text-shadow: 0 0 10px #e94560;
        }
        .back-link {
            margin-top: 10px;
            color: #444;
            text-decoration: none;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="hud">LEVEL: <span id="level">1</span> | DASHES: <span id="dashCount">1</span> | GOAL: <span id="distance">500</span>m | BEST: <span id="best">0</span></div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <a href="../index.html" class="back-link">ESC TO MENU</a>

    <script src="../js/engine.js"></script>
    <script>
        class DashPlayer extends Entity {
            constructor(x, y, targetDistance = 500) {
                super(x, y, 30, 40, '#e94560');
                this.canDash = true;
                this.isDashing = false;
                this.dashCooldown = 0;
                this.targetDistance = targetDistance;
                this.traveled = 0;
                this.speed = 5;
                this.trail = [];
            }

            update(game, deltaTime) {
                if (game.keys['ArrowLeft'] || game.keys['KeyA']) this.vx = -this.speed;
                if (game.keys['ArrowRight'] || game.keys['KeyD']) this.vx = this.speed;
                if ((game.keys['ArrowUp'] || game.keys['Space'] || game.keys['KeyW']) && this.onGround) {
                    this.vy = -12;
                    this.onGround = false;
                    game.playSound(400, 0.1);
                }

                if (game.keys['ShiftLeft'] && this.canDash && !this.isDashing) {
                    this.vx = (game.keys['ArrowLeft'] || game.keys['KeyA']) ? -25 : 25;
                    this.isDashing = true;
                    this.canDash = false;
                    this.dashCooldown = 600;
                    game.playSound(600, 0.1, 'sawtooth');
                    setTimeout(() => { this.isDashing = false; }, 150);
                    // Dash burst particles
                    for(let i=0; i<15; i++) game.addParticle(this.x + this.width/2, this.y + this.height/2, '#00fff5');
                }

                if (this.dashCooldown > 0) {
                    this.dashCooldown -= deltaTime;
                } else if (this.onGround) {
                    this.canDash = true;
                }

                document.getElementById('dashCount').innerText = this.canDash ? 1 : 0;

                super.update(game);

                // Trail effect
                this.trail.push({x: this.x, y: this.y, life: 1.0});
                if (this.trail.length > 10) this.trail.shift();
                this.trail.forEach(t => t.life -= 0.1);

                if (this.y > game.height) {
                    game.state = 'lost';
                    game.playDeathSound();
                }

                this.traveled += Math.abs(this.vx) * 0.05;
                const remaining = Math.max(0, this.targetDistance - Math.floor(this.traveled));
                document.getElementById('distance').innerText = remaining;

                if (remaining <= 0) {
                    game.nextLevel();
                }

                game.entities.forEach(entity => {
                    if (entity instanceof Platform) {
                        if (this.vy > 0 &&
                            this.y + this.height <= entity.y + this.vy &&
                            this.y + this.height + this.vy >= entity.y &&
                            this.x + this.width > entity.x &&
                            this.x < entity.x + entity.width) {
                            this.y = entity.y - this.height;
                            this.vy = 0;
                            this.onGround = true;
                        }
                    }
                    if (entity instanceof Hazard && this.collidesWith(entity)) {
                        game.state = 'lost';
                        game.playDeathSound();
                    }
                });
            }

            draw(ctx) {
                // Trail
                this.trail.forEach(t => {
                    ctx.globalAlpha = t.life * 0.3;
                    ctx.fillStyle = this.isDashing ? '#00fff5' : this.color;
                    ctx.fillRect(t.x, t.y, this.width, this.height);
                });
                ctx.globalAlpha = 1.0;

                // Player Body (Silhouette)
                ctx.fillStyle = '#000';
                ctx.strokeStyle = this.isDashing ? '#00fff5' : this.color;
                ctx.lineWidth = 2;
                ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.strokeRect(this.x, this.y, this.width, this.height);

                // Glowing Visor
                ctx.fillStyle = this.isDashing ? '#fff' : '#00fff5';
                const eyeX = this.vx >= 0 ? this.x + 18 : this.x + 2;
                ctx.fillRect(eyeX, this.y + 10, 10, 3);
            }
        }

        class Platform extends Entity {
            constructor(x, y, w, h, color) {
                super(x, y, w, h, color);
            }
            update(game, deltaTime) {}
            draw(ctx) {
                ctx.fillStyle = '#1a1a2e';
                ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.strokeStyle = '#4e4e4e';
                ctx.lineWidth = 1;
                ctx.strokeRect(this.x, this.y, this.width, this.height);
                // Neon top edge
                ctx.strokeStyle = '#e94560';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x + this.width, this.y);
                ctx.stroke();
            }
        }

        class Hazard extends Entity {
            constructor(x, y, width, height) {
                super(x, y, width, height, '#00fff5');
            }
            update(game, deltaTime) {}
            draw(ctx) {
                ctx.fillStyle = '#000';
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2;
                ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.strokeRect(this.x, this.y, this.width, this.height);

                // Pulsing glow effect
                const glow = Math.sin(Date.now() * 0.01) * 5 + 10;
                ctx.shadowBlur = glow;
                ctx.shadowColor = this.color;
                ctx.strokeRect(this.x + 2, this.y + 2, this.width - 4, this.height - 4);
                ctx.shadowBlur = 0;
            }
        }

        class DashGame extends Game {
            constructor() {
                super('gameCanvas', { gravity: 0.6, friction: 0.9, hasFloor: false, gameId: 'midnight_dash' });
                this.level = 1;
                this.buildings = Array.from({length: 10}, (_, i) => ({
                    x: i * 150,
                    w: 80 + Math.random() * 60,
                    h: 100 + Math.random() * 200,
                    speed: 0.2 + Math.random() * 0.2
                }));
                this.setupEntities();
                document.getElementById('best').innerText = this.highScore;
            }
            setupEntities() {
                this.entities = [];
                const targetDist = 400 + this.level * 200;

                // Base platforms
                this.entities.push(new Platform(0, 350, 200, 10, '#4e4e4e'));
                this.entities.push(new Platform(250, 280, 150, 10, '#4e4e4e'));
                this.entities.push(new Platform(450, 220, 120, 10, '#4e4e4e'));
                this.entities.push(new Platform(600, 300, 150, 10, '#4e4e4e'));
                this.entities.push(new Platform(100, 150, 100, 10, '#4e4e4e'));

                // More hazards and platforms as levels increase
                if (this.level >= 1) {
                    this.entities.push(new Hazard(300, 260, 40, 20));
                    this.entities.push(new Hazard(650, 280, 60, 20));
                    this.entities.push(new Hazard(120, 130, 30, 20));
                }
                if (this.level >= 2) {
                    this.entities.push(new Platform(300, 100, 100, 10, '#4e4e4e'));
                    this.entities.push(new Hazard(320, 80, 40, 20));
                }
                if (this.level >= 3) {
                    this.entities.push(new Platform(500, 350, 80, 10, '#4e4e4e'));
                    this.entities.push(new Hazard(520, 330, 40, 20));
                }

                this.entities.push(new DashPlayer(50, 300, targetDist));
                document.getElementById('level').innerText = this.level;
                document.getElementById('distance').innerText = targetDist;
            }
            nextLevel() {
                this.level++;
                if (this.level > 5) {
                    this.state = 'won';
                    this.playSound(800, 0.5);
                } else {
                    this.playSound(1000, 0.2);
                    this.setupEntities();
                }
            }
            draw() {
                // Background parallax buildings
                this.buildings.forEach(b => {
                    const bx = (b.x - (this.entities.find(e => e instanceof DashPlayer)?.traveled || 0) * b.speed) % 1500;
                    if (bx < -200) b.x += 1500;

                    this.ctx.fillStyle = '#0a0a1a';
                    this.ctx.fillRect(bx, this.height - b.h, b.w, b.h);

                    // Windows
                    this.ctx.fillStyle = Math.random() > 0.9 ? '#ff0' : '#1a1a2e';
                    for(let r=0; r<b.h/20; r++) {
                        for(let c=0; c<b.w/20; c++) {
                            if ((r+c) % 3 === 0) this.ctx.fillRect(bx + 10 + c*20, this.height - b.h + 10 + r*20, 5, 5);
                        }
                    }
                });
                super.draw();
            }
        }

        const game = new DashGame();
        document.body.addEventListener('keydown', () => {
            game.startMusic([
                {f: 110.00, d: 0.2}, {f: 123.47, d: 0.2}, {f: 130.81, d: 0.2}, {f: 146.83, d: 0.4},
                {f: 130.81, d: 0.2}, {f: 123.47, d: 0.2}, {f: 110.00, d: 0.4}
            ]);
        }, { once: true });
        game.start();
    </script>
</body>
</html>
