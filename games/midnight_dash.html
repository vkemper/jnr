<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Dash - JNR</title>
    <style>
        body {
            background-color: #0c0c0c;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: radial-gradient(circle, #1a1a2e 0%, #000 100%);
        }
        canvas {
            background-color: #000;
            border: 4px solid #e94560;
            box-shadow: 0 0 50px rgba(233, 69, 96, 0.3);
        }
        .hud {
            margin-bottom: 10px;
            font-size: 1.2rem;
            color: #e94560;
            text-shadow: 0 0 10px #e94560;
        }
        .back-link {
            margin-top: 10px;
            color: #444;
            text-decoration: none;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="hud">DASHES: <span id="dashCount">1</span> | GOAL: <span id="distance">500</span>m</div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <a href="../index.html" class="back-link">ESC TO MENU</a>

    <script src="../js/engine.js"></script>
    <script>
        class DashPlayer extends Entity {
            constructor(x, y) {
                super(x, y, 30, 40, '#e94560');
                this.canDash = true;
                this.isDashing = false;
                this.dashCooldown = 0;
                this.targetDistance = 500;
                this.traveled = 0;
                this.speed = 5;
            }

            update(game, deltaTime) {
                if (game.keys['ArrowLeft'] || game.keys['KeyA']) this.vx = -this.speed;
                if (game.keys['ArrowRight'] || game.keys['KeyD']) this.vx = this.speed;
                if ((game.keys['ArrowUp'] || game.keys['Space'] || game.keys['KeyW']) && this.onGround) {
                    this.vy = -12;
                    this.onGround = false;
                    game.playSound(400, 0.1);
                }

                if (game.keys['ShiftLeft'] && this.canDash && !this.isDashing) {
                    this.vx = (game.keys['ArrowLeft'] || game.keys['KeyA']) ? -20 : 20;
                    this.isDashing = true;
                    this.canDash = false;
                    this.dashCooldown = 600;
                    game.playSound(600, 0.1, 'sawtooth');
                    setTimeout(() => { this.isDashing = false; }, 150);
                }

                if (this.dashCooldown > 0) {
                    this.dashCooldown -= deltaTime;
                } else if (this.onGround) {
                    this.canDash = true;
                }

                document.getElementById('dashCount').innerText = this.canDash ? 1 : 0;

                super.update(game);

                if (this.y > game.height) {
                    game.state = 'lost';
                    game.playDeathSound();
                }

                this.traveled += Math.abs(this.vx) * 0.05;
                const remaining = Math.max(0, this.targetDistance - Math.floor(this.traveled));
                document.getElementById('distance').innerText = remaining;

                if (remaining <= 0) {
                    game.state = 'won';
                    game.playSound(800, 0.5);
                }

                game.entities.forEach(entity => {
                    if (entity instanceof Platform) {
                        if (this.vy > 0 &&
                            this.y + this.height <= entity.y + this.vy &&
                            this.y + this.height + this.vy >= entity.y &&
                            this.x + this.width > entity.x &&
                            this.x < entity.x + entity.width) {
                            this.y = entity.y - this.height;
                            this.vy = 0;
                            this.onGround = true;
                        }
                    }
                    if (entity instanceof Hazard && this.collidesWith(entity)) {
                        game.state = 'lost';
                        game.playDeathSound();
                    }
                });
            }
        }

        class Platform extends Entity {
            constructor(x, y, w, h, color) {
                super(x, y, w, h, color);
            }
            update() {}
        }

        class Hazard extends Entity {
            constructor(x, y, width, height) {
                super(x, y, width, height, '#00fff5');
            }
            update() {}
            draw(ctx) {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.width, this.height);
            }
        }

        const game = new Game('gameCanvas', { gravity: 0.6, friction: 0.9, hasFloor: false });
        game.entities.push(new Platform(0, 350, 200, 10, '#4e4e4e'));
        game.entities.push(new Platform(250, 280, 150, 10, '#4e4e4e'));
        game.entities.push(new Platform(450, 220, 120, 10, '#4e4e4e'));
        game.entities.push(new Platform(600, 300, 150, 10, '#4e4e4e'));
        game.entities.push(new Platform(100, 150, 100, 10, '#4e4e4e'));
        game.entities.push(new Hazard(300, 260, 40, 20));
        game.entities.push(new Hazard(650, 280, 60, 20));
        game.entities.push(new Hazard(120, 130, 30, 20));
        game.entities.push(new DashPlayer(50, 300));

        document.body.addEventListener('keydown', () => {
            game.startMusic([
                {f: 110.00, d: 0.2}, {f: 123.47, d: 0.2}, {f: 130.81, d: 0.2}, {f: 146.83, d: 0.4},
                {f: 130.81, d: 0.2}, {f: 123.47, d: 0.2}, {f: 110.00, d: 0.4}
            ]);
        }, { once: true });
        game.start();
    </script>
</body>
</html>
