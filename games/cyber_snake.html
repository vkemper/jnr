<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Snake - JNR</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        canvas { background: #000; border: 4px solid #00f7ff; box-shadow: 0 0 20px #00f7ff; }
        .ui { margin-bottom: 10px; font-size: 1.2rem; color: #00f7ff; }
        .back-link { margin-top: 10px; color: #444; text-decoration: none; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="ui">SCORE: <span id="score">0</span> | BEST: <span id="best">0</span></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <a href="../index.html" class="back-link">ESC TO MENU</a>

    <script src="../js/engine.js"></script>
    <script>
        class SnakeGame extends Game {
            constructor() {
                super('gameCanvas', { gravity: 0, friction: 1, gameId: 'cyber_snake' });
                document.getElementById('best').innerText = this.highScore;
                this.gridSize = 20;
                this.snake = [{x: 10, y: 10}];
                this.direction = {x: 1, y: 0};
                this.nextDirection = {x: 1, y: 0};
                this.food = this.spawnFood();
                this.moveTimer = 0;
                this.moveInterval = 150;
            }
            spawnFood() {
                return {
                    x: Math.floor(Math.random() * (this.width / this.gridSize)),
                    y: Math.floor(Math.random() * (this.height / this.gridSize))
                };
            }
            update(deltaTime) {
                if (this.state !== 'playing') return;

                if ((this.keys['ArrowUp'] || this.keys['KeyW']) && this.direction.y === 0) this.nextDirection = {x: 0, y: -1};
                if ((this.keys['ArrowDown'] || this.keys['KeyS']) && this.direction.y === 0) this.nextDirection = {x: 0, y: 1};
                if ((this.keys['ArrowLeft'] || this.keys['KeyA']) && this.direction.x === 0) this.nextDirection = {x: -1, y: 0};
                if ((this.keys['ArrowRight'] || this.keys['KeyD']) && this.direction.x === 0) this.nextDirection = {x: 1, y: 0};

                this.moveTimer += deltaTime;
                if (this.moveTimer > this.moveInterval) {
                    this.direction = this.nextDirection;
                    const head = {x: this.snake[0].x + this.direction.x, y: this.snake[0].y + this.direction.y};

                    if (head.x < 0 || head.x >= this.width / this.gridSize || head.y < 0 || head.y >= this.height / this.gridSize || this.snake.some(s => s.x === head.x && s.y === head.y)) {
                        this.state = 'lost';
                        this.playDeathSound();
                        return;
                    }

                    this.snake.unshift(head);
                    if (head.x === this.food.x && head.y === this.food.y) {
                        this.score += 10;
                        document.getElementById('score').innerText = this.score;
                        this.food = this.spawnFood();
                        this.moveInterval = Math.max(50, this.moveInterval - 2);
                        this.playSound(800, 0.05);
                    } else {
                        this.snake.pop();
                    }
                    this.moveTimer = 0;
                }
            }
            draw() {
                this.ctx.clearRect(0, 0, this.width, this.height);
                this.ctx.fillStyle = '#00f7ff';
                this.snake.forEach((s, i) => {
                    this.ctx.globalAlpha = i === 0 ? 1 : 0.6;
                    this.ctx.fillRect(s.x * this.gridSize, s.y * this.gridSize, this.gridSize - 2, this.gridSize - 2);
                });
                this.ctx.globalAlpha = 1;
                this.ctx.fillStyle = '#ff004d';
                this.ctx.fillRect(this.food.x * this.gridSize, this.food.y * this.gridSize, this.gridSize - 2, this.gridSize - 2);

                if (this.state !== 'playing') {
                    super.draw();
                }
            }
        }
        const game = new SnakeGame();
        game.start();
    </script>
</body>
</html>
